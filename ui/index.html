<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Agent Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark-dimmed.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked-highlight@2.2.1/lib/index.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/diff.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════════ */
:root {
  --bg:       #080706;
  --bg1:      #0e0c0a;
  --bg2:      #141210;
  --bg3:      #1c1814;
  --border:   rgba(255,210,100,.1);
  --border2:  rgba(255,210,100,.2);
  --border3:  rgba(255,210,100,.4);
  --gold:     #d4a832;
  --gold-dim: rgba(212,168,50,.4);
  --gold-glow:rgba(212,168,50,.15);
  --text:     #e8dfc8;
  --text-dim: rgba(232,223,200,.35);
  --text-xs:  rgba(232,223,200,.2);
  --blue:     #4a9eff;
  --blue-dim: rgba(74,158,255,.25);
  --ff-head:  'Syne', sans-serif;
  --ff-mono:  'DM Mono', monospace;
  --font-delta: 0px;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body {
  width:100%; height:100%; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:var(--ff-mono);
  user-select:none;
  -webkit-text-size-adjust:none;
}

/* ═══════════════════════════════════════════════════════
   BACKGROUND
═══════════════════════════════════════════════════════ */
#bg-wrap {
  position:fixed; inset:0; z-index:0;
}
#bg-img {
  width:100%; height:100%;
  object-fit:cover; object-position:center 40%;
  filter:brightness(.3) saturate(.5) sepia(.2);
}
/* Rich vignette — heavier on sides where panels sit */
#bg-wrap::after {
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 100% at 50% 50%, transparent 20%, rgba(8,7,6,.7) 80%),
    linear-gradient(to right,  rgba(8,7,6,.96) 0%, rgba(8,7,6,.3) 10%, transparent 30%),
    linear-gradient(to left,   rgba(8,7,6,.98) 0%, rgba(8,7,6,.4) 12%, transparent 32%),
    linear-gradient(to bottom, rgba(8,7,6,.6)  0%, transparent 15%),
    linear-gradient(to top,    rgba(8,7,6,.8)  0%, transparent 20%);
}

/* Subtle scanline texture */
#bg-wrap::before {
  content:''; position:absolute; inset:0; z-index:1; pointer-events:none;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px
  );
}

/* ═══════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════ */
#app {
  position:fixed; inset:0; z-index:1;
  display:flex; align-items:stretch;
}

/* ═══════════════════════════════════════════════════════
   LEFT — Avatar column
═══════════════════════════════════════════════════════ */
#left {
  width:72px; flex-shrink:0;
  display:flex; flex-direction:column;
  align-items:center;
  padding:24px 0 20px;
  gap:0;
  border-right:1px solid var(--border);
  position:relative; z-index:10;
}



/* Bottom of left panel */
#left-footer {
  flex-shrink:0;
  display:flex; flex-direction:column;
  align-items:center; gap:8px;
  padding-bottom:4px;
}
#left-version {
  font-family:var(--ff-mono);
  font-size:calc(7px + var(--font-delta)); letter-spacing:1.5px;
  color:var(--text);
  opacity:.35;
  text-align:center;
}
#settings-btn {
  width:36px; height:36px; border-radius:50%;
  border:1px solid var(--border2);
  background:rgba(14,12,10,.6);
  color:var(--text-dim);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .2s;
  flex-shrink:0;
}
#settings-btn:hover {
  border-color:rgba(255,255,255,.3);
  color:var(--text);
  background:rgba(255,255,255,.06);
  transform:rotate(45deg);
}
#settings-btn svg { width:14px; height:14px; pointer-events:none; }
#av-list {
  display:flex; flex-direction:column;
  align-items:center; gap:18px;
  flex:1;
  width:100%;
}

/* Single avatar */
.av {
  position:relative;
  width:46px; height:46px;
  cursor:pointer;
  z-index:1;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), z-index 0s;
}
.av:hover { transform:scale(1.12); z-index:20; }
.av.active { transform:scale(1.06); z-index:10; }
.av.offline { opacity:.22; filter:grayscale(1); cursor:not-allowed; pointer-events:none; }

/* Ring — animated on unread */
.av-ring {
  position:absolute; inset:-4px; border-radius:50%;
  border:1.5px solid var(--col);
  opacity:.18; transition:opacity .3s, box-shadow .3s;
}
.av.unread .av-ring {
  opacity:.9;
  animation:av-pulse 2s ease-in-out infinite;
}
.av.active .av-ring {
  opacity:1;
  box-shadow:0 0 0 2px color-mix(in srgb, var(--col) 25%, transparent),
             0 0 16px 2px color-mix(in srgb, var(--col) 30%, transparent);
  animation:none;
}
@keyframes av-pulse {
  0%,100%{ box-shadow:0 0 0 0 color-mix(in srgb, var(--col) 20%, transparent); opacity:.7; }
  50%    { box-shadow:0 0 0 5px color-mix(in srgb, var(--col) 0%, transparent); opacity:1; }
}

/* Circle face */
.av-face {
  position:absolute; inset:0; border-radius:50%;
  background:
    radial-gradient(circle at 35% 35%, color-mix(in srgb, var(--col) 18%, var(--bg1)), var(--bg1));
  border:1.5px solid color-mix(in srgb, var(--col) 40%, transparent);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  transition:border-color .2s;
}
.av.active .av-face {
  border-color:color-mix(in srgb, var(--col) 80%, transparent);
}
.av-initials {
  font-family:var(--ff-head);
  font-size:calc(13px + var(--font-delta)); font-weight:700;
  color:var(--col);
  letter-spacing:0;
  line-height:1;
}

/* Role dot */
.av-role-dot {
  position:absolute; bottom:1px; right:1px;
  width:9px; height:9px; border-radius:50%;
  background:var(--col);
  border:2px solid var(--bg);
  opacity:.7;
}
.av.active .av-role-dot { opacity:1; }

/* Unread badge */
.av-badge {
  position:absolute; top:-1px; right:-3px;
  background:#c0392b; color:#fff;
  font-family:var(--ff-mono); font-size:calc(8px + var(--font-delta)); font-weight:500;
  min-width:16px; height:16px; border-radius:999px;
  display:none; align-items:center; justify-content:center;
  padding:0 4px; border:2px solid var(--bg);
  box-shadow:0 0 8px rgba(192,57,43,.6);
  white-space:nowrap;
}
.av.unread .av-badge { display:flex; }

/* Tooltip */
.av-tip {
  position:absolute; left:56px; top:50%;
  transform:translateY(-50%);
  background:var(--bg2); border:1px solid var(--border3);
  color:var(--text); font-family:var(--ff-mono);
  font-size:calc(9px + var(--font-delta)); letter-spacing:.8px;
  padding:4px 10px; white-space:nowrap;
  pointer-events:none; opacity:0;
  transition:opacity .15s, transform .15s;
  transform:translateY(-50%) translateX(-4px);
  box-shadow:4px 4px 16px rgba(0,0,0,.6);
  z-index:100;
}
.av-tip span { color:var(--gold-dim); font-size:calc(8px + var(--font-delta)); display:block; margin-top:1px; }
.av:hover .av-tip {
  opacity:1;
  transform:translateY(-50%) translateX(0);
}

/* ═══════════════════════════════════════════════════════
   CENTER — Chat
═══════════════════════════════════════════════════════ */
#center {
  flex:1; min-width:0;
  display:flex; flex-direction:column;
  position:relative; z-index:10;
  overflow:hidden;
}



/* Empty / active chat */
#empty-state {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  pointer-events:none;
}
#empty-state.hidden { display:none; }
#empty-icon {
  font-size:calc(40px + var(--font-delta)); opacity:.1;
  animation:float 4s ease-in-out infinite;
}
@keyframes float {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}
}
#empty-txt {
  font-family:var(--ff-head);
  font-size:calc(11px + var(--font-delta)); font-weight:600; letter-spacing:3px; text-transform:uppercase;
  color:var(--text-xs);
}

/* Chat area: character on left, messages on right */
#chat-area {
  flex:1; display:flex;
  align-items:flex-end;
  padding:16px 20px 0 20px;
  gap:20px;
  min-height:0;
  opacity:0; transition:opacity .35s;
}
#chat-area.visible { opacity:1; }

/* Character column */
#char-col {
  flex-shrink:0; width:288px;
  display:flex; flex-direction:column;
  align-items:center;
  align-self:flex-end;
  position:relative;
}
#char-img {
  height:360px; width:auto;
  max-height:calc(100vh - 200px);
  object-fit:contain; object-position:bottom center;
  image-rendering:pixelated;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.8))
         drop-shadow(0 2px 4px rgba(0,0,0,.9));
  transition:opacity .15s;
  display:block;
}
#char-nameplate {
  position:absolute; bottom:-1px; left:50%;
  transform:translateX(-50%);
  white-space:nowrap;
  display:flex; flex-direction:column; align-items:center; gap:1px;
}
#char-name {
  font-family:var(--ff-head);
  font-size:calc(10px + var(--font-delta)); font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--agent-col, var(--gold));
  text-shadow:0 0 12px color-mix(in srgb, var(--agent-col, var(--gold)) 40%, transparent);
}
#char-role {
  font-family:var(--ff-mono);
  font-size:calc(8px + var(--font-delta)); letter-spacing:2px; text-transform:uppercase;
  color:var(--text-dim);
}

/* Messages */
#msg-col {
  flex:1; min-width:0;
  display:flex; flex-direction:column;
  height:100%; overflow:hidden;
}
#msg-scroll {
  flex:1; overflow-y:auto;
  display:flex; flex-direction:column;
  gap:12px; padding:0 2px 16px 0;
  scrollbar-width:thin;
  scrollbar-color:rgba(212,168,50,.15) transparent;
}
#msg-scroll::-webkit-scrollbar { width:2px; }
#msg-scroll::-webkit-scrollbar-thumb {
  background:rgba(212,168,50,.2); border-radius:1px;
}

/* Messages */
.msg { display:flex; flex-direction:column; gap:4px; max-width:86%; animation:msg-fade .25s ease-out; }
@keyframes msg-fade { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.msg.agent { align-self:flex-start; }
.msg.user  { align-self:flex-end; }
.msg-who {
  font-family:var(--ff-mono);
  font-size:max(10px, calc(8px + var(--font-delta))); letter-spacing:1.5px; text-transform:uppercase;
}
.msg.agent .msg-who { color:var(--agent-col, var(--gold-dim)); padding-left:12px; }
.msg.user  .msg-who { color:rgba(74,158,255,.4); text-align:right; padding-right:12px; }
.msg-bubble {
  font-family:var(--ff-mono);
  font-size:max(10px, calc(12.5px + var(--font-delta))); line-height:1.7; letter-spacing:.15px;
  word-break:break-word; padding:10px 14px;
}
.msg.agent .msg-bubble {
  background:rgba(20,17,12,.7);
  border-left:2px solid var(--agent-col, var(--gold));
  border-top:1px solid rgba(255,255,255,.05);
  border-right:1px solid rgba(255,255,255,.03);
  color:var(--text);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
  padding-left:18px;
}
.msg.user .msg-bubble {
  background:rgba(10,18,30,.7);
  border-right:2px solid var(--blue);
  border-top:1px solid rgba(74,158,255,.1);
  border-left:1px solid rgba(74,158,255,.04);
  color:rgba(180,210,255,.9);
}

/* Markdown in chat bubbles */
.msg-bubble pre, .tl-bubble pre {
  background:var(--bg);border:1px solid var(--border);border-radius:4px;
  padding:10px 14px;margin:6px 0;overflow-x:auto;font-size:calc(11px + var(--font-delta));line-height:1.5;
}
.msg-bubble pre code, .tl-bubble pre code {background:none;padding:0;color:var(--text)}
.msg-bubble code, .tl-bubble code {
  background:var(--bg2);padding:1px 5px;border-radius:3px;
  font-size:calc(11px + var(--font-delta));color:#5de8a0;
}
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3,
.tl-bubble h1,.tl-bubble h2,.tl-bubble h3 {color:var(--gold);margin:8px 0 4px;font-family:var(--ff-head)}
.msg-bubble h1,.tl-bubble h1 {font-size:calc(13px + var(--font-delta))}
.msg-bubble h2,.tl-bubble h2 {font-size:calc(11.5px + var(--font-delta))}
.msg-bubble h3,.tl-bubble h3 {font-size:calc(10.5px + var(--font-delta))}
.msg-bubble p,.tl-bubble p {margin:4px 0}
.msg-bubble strong,.tl-bubble strong {color:#eef}
.msg-bubble em,.tl-bubble em {color:var(--text-dim);font-style:italic}
.msg-bubble ul,.msg-bubble ol,.tl-bubble ul,.tl-bubble ol {margin:4px 0 4px 16px}
.msg-bubble li,.tl-bubble li {margin:2px 0}
.msg-bubble table,.tl-bubble table {border-collapse:collapse;width:100%;margin:6px 0;font-size:calc(10px + var(--font-delta))}
.msg-bubble th,.msg-bubble td,.tl-bubble th,.tl-bubble td {border:1px solid var(--border);padding:4px 8px;text-align:left}
.msg-bubble th,.tl-bubble th {background:var(--bg2);color:var(--gold);font-family:var(--ff-head)}
.msg-bubble td,.tl-bubble td {color:var(--text-dim)}
.msg-bubble blockquote,.tl-bubble blockquote {border-left:3px solid var(--gold);padding-left:10px;margin:6px 0;color:var(--text-dim)}
.msg-bubble hr,.tl-bubble hr {border:none;border-top:1px solid var(--border);margin:8px 0}

/* Collapsible long messages */
.msg-collapse {margin:0}
.msg-collapse summary {
  cursor:pointer;color:var(--text-dim);font-size:calc(11px + var(--font-delta));
  line-height:1.5;list-style:none;
}
.msg-collapse summary::-webkit-details-marker {display:none}
.msg-collapse summary::before {content:'▸ ';color:var(--gold)}
.msg-collapse[open] summary::before {content:'▾ '}
.msg-collapse-meta {color:var(--gold);font-size:calc(9px + var(--font-delta));opacity:.7}
.msg-collapse-body {margin-top:8px;border-top:1px solid var(--border);padding-top:8px}

/* Clickable links in messages & doc viewer */
.msg-bubble a, .tl-bubble a, .doc-body a {
  color:var(--gold); text-decoration:underline;
  text-underline-offset:2px; text-decoration-color:rgba(212,168,50,.4);
  transition:color .15s, text-decoration-color .15s;
}
.msg-bubble a:hover, .tl-bubble a:hover, .doc-body a:hover {
  color:#ffe082; text-decoration-color:rgba(255,224,130,.6);
}

/* Thinking dots */
#thinking {
  display:none; align-self:flex-start;
  padding:10px 16px;
  background:rgba(20,17,12,.7);
  border-left:2px solid var(--agent-col,var(--gold));
  gap:5px; align-items:center;
}
#thinking.show { display:flex; }
.tdot {
  width:4px; height:4px; border-radius:50%;
  background:var(--agent-col,var(--gold)); opacity:.3;
  animation:tdot 1.4s ease-in-out infinite;
}
.tdot:nth-child(2){animation-delay:.15s;}
.tdot:nth-child(3){animation-delay:.3s;}
@keyframes tdot {
  0%,80%,100%{transform:scale(.8);opacity:.2}
  40%{transform:scale(1.2);opacity:.9}
}

/* ── Input bar ─────────────────────────────────────── */
#input-bar {
  flex-shrink:0;
  padding:12px 20px 16px;
  border-top:1px solid var(--border);
  background:rgba(8,7,6,.7);
  backdrop-filter:blur(12px);
  display:flex; flex-direction:column; gap:8px;
  transition:opacity .2s;
  position:relative;
}
#input-bar::before {
  content:'';
  position:absolute; top:0; left:20px; right:20px; height:1px;
  background:linear-gradient(to right,
    transparent,
    var(--agent-col, var(--gold)) 30%,
    var(--agent-col, var(--gold)) 70%,
    transparent);
  opacity:.5;
}
#input-bar.disabled { opacity:.25; pointer-events:none; }

/* top row: label + char counter */
#input-meta {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 2px;
}
#input-agent-label {
  font-family:var(--ff-head);
  font-size:calc(7px + var(--font-delta)); font-weight:700; letter-spacing:3px; text-transform:uppercase;
  color:var(--agent-col, var(--gold));
  opacity:.7;
}
#input-hint {
  font-family:var(--ff-mono);
  font-size:calc(7px + var(--font-delta)); letter-spacing:1px;
  color:var(--text-xs);
}

/* input row */
#input-row {
  display:flex; align-items:flex-end; gap:0;
  border:1px solid color-mix(in srgb, var(--agent-col, var(--gold)) 25%, rgba(255,255,255,.06));
  transition:border-color .2s;
}
#input-row:focus-within {
  border-color:color-mix(in srgb, var(--agent-col, var(--gold)) 60%, transparent);
  box-shadow:0 0 0 1px color-mix(in srgb, var(--agent-col, var(--gold)) 12%, transparent),
             0 4px 20px rgba(0,0,0,.4);
}
#msg-input {
  flex:1;
  background:rgba(10,9,7,.85);
  border:none; outline:none; resize:none; overflow:hidden;
  color:var(--text); font-family:var(--ff-mono);
  font-size:max(10px, calc(12px + var(--font-delta))); line-height:1.65;
  padding:10px 14px; max-height:88px;
}
#msg-input::placeholder {
  color:var(--text-xs);
  font-style:italic;
}
#send-btn {
  flex-shrink:0;
  background:color-mix(in srgb, var(--agent-col, var(--gold)) 10%, rgba(14,12,10,.9));
  border:none;
  border-left:1px solid color-mix(in srgb, var(--agent-col, var(--gold)) 20%, transparent);
  color:var(--agent-col, var(--gold));
  width:46px; align-self:stretch;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .15s;
  position:relative; overflow:hidden;
}
#send-btn::after {
  content:'';
  position:absolute; inset:0;
  background:color-mix(in srgb, var(--agent-col, var(--gold)) 15%, transparent);
  opacity:0; transition:opacity .15s;
}
#send-btn:hover::after { opacity:1; }
#send-btn svg { width:16px; height:16px; flex-shrink:0; pointer-events:none; }

/* @mention autocomplete */
.mention-dropdown {
  position:absolute; bottom:100%; left:0; right:0;
  background:rgba(14,12,10,.96);
  border:1px solid var(--border2);
  border-bottom:none;
  max-height:200px; overflow-y:auto;
  display:none; z-index:50;
  backdrop-filter:blur(12px);
  scrollbar-width:thin; scrollbar-color:rgba(212,168,50,.15) transparent;
}
.mention-dropdown.open { display:block; }
.mention-item {
  display:flex; align-items:center; gap:8px;
  padding:7px 12px; cursor:pointer;
  font-family:var(--ff-mono);
  font-size:calc(11px + var(--font-delta));
  color:var(--text-dim);
  transition:background .1s;
}
.mention-item:hover,
.mention-item.selected {
  background:rgba(212,168,50,.12);
  color:var(--text);
}
.mention-item-dot {
  width:8px; height:8px; border-radius:50%;
  flex-shrink:0;
}
.mention-item-name { color:var(--gold); font-weight:600; }
.mention-item-role {
  color:var(--text-xs);
  font-size:calc(9px + var(--font-delta));
  margin-left:auto;
  text-transform:uppercase; letter-spacing:.5px;
}

/* ═══════════════════════════════════════════════════════
   RIGHT — Team Lead
═══════════════════════════════════════════════════════ */
#right {
  width:30vw; min-width:240px; max-width:30vw; flex-shrink:0;
  display:flex; flex-direction:column;
  border-left:1px solid var(--border);
  background:rgba(6,5,4,.6);
  backdrop-filter:blur(10px);
  position:relative; z-index:10;
}
#right-resize {
  position:absolute; left:-4px; top:0; bottom:0; width:8px;
  cursor:col-resize; z-index:20;
  background:transparent; transition:background .2s;
}
#right-resize:hover, #right-resize.dragging {
  background:var(--gold);
  opacity:.4;
}
body.resizing-right { cursor:col-resize !important; user-select:none; }

#tl-topbar {
  flex-shrink:0;
  padding:0 16px;
  height:36px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid var(--border);
}
#tl-online-dot {
  width:7px; height:7px; border-radius:50%;
  background:#5de8a0;
  box-shadow:0 0 8px rgba(93,232,160,.7);
  flex-shrink:0;
  animation:pulse-dot 3s ease-in-out infinite;
}
@keyframes pulse-dot{
  0%,100%{box-shadow:0 0 5px rgba(93,232,160,.5);}
  50%{box-shadow:0 0 14px rgba(93,232,160,.9),0 0 4px rgba(93,232,160,.4);}
}
#tl-header-text {
  display:flex; flex-direction:column; gap:0;
}
#tl-header-label {
  font-family:var(--ff-mono);
  font-size:calc(7px + var(--font-delta)); letter-spacing:2px; text-transform:uppercase;
  color:var(--gold-dim);
}
#tl-lead-select {
  font-family:var(--ff-head);
  font-size:calc(10px + var(--font-delta)); font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:var(--gold); background:var(--bg1); border:1px solid var(--border);
  border-radius:4px; padding:2px 6px; cursor:pointer; outline:none;
  max-width:100%;
}
#tl-lead-select:hover { border-color:var(--border2); }
#tl-lead-select:focus { border-color:var(--gold-dim); }
#tl-lead-select option { background:var(--bg1); color:var(--text); text-transform:uppercase; }
#tl-lead-select option:disabled { color:var(--text-dim); }
#tl-lead-select optgroup { color:var(--gold-dim); font-size:calc(8px + var(--font-delta)); letter-spacing:1px; font-style:normal; }
#tl-lead-select option[value^="__mode:"] { color:var(--green); font-style:italic; }

/* TL character */
#tl-char-wrap {
  flex-shrink:0;
  display:flex; justify-content:center; align-items:flex-end;
  padding:12px 10px 0;
  height:360px; overflow:hidden;
  position:relative;
}
/* Subtle glow floor under TL character */
#tl-char-wrap::before {
  content:''; position:absolute; bottom:0; left:50%;
  transform:translateX(-50%);
  width:160px; height:60px;
  background:radial-gradient(ellipse, rgba(212,168,50,.12) 0%, transparent 70%);
  pointer-events:none;
}
#tl-img {
  height:360px; width:auto; max-width:324px;
  object-fit:contain; object-position:bottom center;
  image-rendering:pixelated;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.9));
  transition:opacity .15s;
  display:block;
}
#tl-img.owner-sprite {
  transform:scaleX(.85);
  transform-origin:bottom center;
}

/* TL messages */
#tl-msg-scroll {
  flex:1; overflow-y:auto; min-height:0;
  padding:28px 12px 10px; display:flex; flex-direction:column; gap:8px;
  scrollbar-width:thin; scrollbar-color:rgba(212,168,50,.12) transparent;
}
#tl-msg-scroll::-webkit-scrollbar { width:2px; }
#tl-msg-scroll::-webkit-scrollbar-thumb { background:rgba(212,168,50,.15); }

.tl-msg { display:flex; flex-direction:column; gap:2px; animation:msg-fade .2s ease-out; }
.tl-msg.agent { align-self:flex-start; max-width:90%; }
.tl-msg.user  { align-self:flex-end; max-width:90%; }
.tl-msg-who {
  font-family:var(--ff-mono);
  font-size:max(10px, calc(7px + var(--font-delta))); letter-spacing:1.5px; text-transform:uppercase;
}
.tl-msg.agent .tl-msg-who { color:rgba(212,168,50,.35); padding-left:10px; }
.tl-msg.user  .tl-msg-who { color:rgba(74,158,255,.3); text-align:right; padding-right:10px; }
.tl-bubble {
  font-family:var(--ff-mono);
  font-size:max(10px, calc(12.5px + var(--font-delta))); line-height:1.7; padding:7px 10px;
  word-break:break-word; letter-spacing:.1px;
}
.tl-msg.agent .tl-bubble {
  background:rgba(18,15,10,.7); border-left:1.5px solid var(--gold);
  border-top:1px solid rgba(255,255,255,.04);
  color:var(--text);
  padding-left:14px;
}
.tl-msg.user .tl-bubble {
  background:rgba(8,14,24,.7); border-right:1.5px solid var(--blue);
  color:rgba(170,200,255,.85);
}

#tl-thinking {
  display:none; align-self:flex-start;
  padding:8px 12px; background:rgba(18,15,10,.7);
  border-left:1.5px solid var(--gold); gap:4px; align-items:center;
}
#tl-thinking.show { display:flex; }
#tl-thinking .tdot { background:var(--gold); }

/* TL input */
#tl-input-row {
  flex-shrink:0;
  padding:10px 14px 14px;
  border-top:1px solid var(--border);
  display:flex; gap:0;
  background:rgba(6,5,4,.5);
}
#tl-input {
  flex:1; background:rgba(12,10,8,.85);
  border:1px solid var(--border2); border-right:none;
  outline:none; resize:none; overflow:hidden;
  color:var(--text); font-family:var(--ff-mono);
  font-size:max(10px, calc(11px + var(--font-delta))); line-height:1.55; padding:8px 11px;
  max-height:72px; transition:border-color .2s;
}
#tl-input:focus { border-color:var(--border3); }
#tl-input::placeholder { color:var(--text-xs); font-style:italic; }
#tl-send {
  flex-shrink:0;
  background:rgba(20,16,10,.9);
  border:1px solid var(--border2);
  color:var(--gold);
  width:44px; align-self:stretch;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
#tl-send:hover { background:rgba(212,168,50,.1); border-color:var(--gold); }
#tl-send svg { width:13px; height:13px; pointer-events:none; }
#tl-input:disabled { opacity:.4; cursor:not-allowed; }
#tl-send:disabled { opacity:.3; cursor:not-allowed; pointer-events:none; }

/* ═══════════════════════════════════════════════════════
   SCROLLBAR global
═══════════════════════════════════════════════════════ */
::-webkit-scrollbar { width:2px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(212,168,50,.15); }

/* ═══════════════════════════════════════════════════════
   SETTINGS DIALOG
═══════════════════════════════════════════════════════ */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.settings-dialog{background:var(--bg1);border:1px solid var(--border2);border-radius:4px;
  width:360px;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;
  box-shadow:0 4px 40px rgba(0,0,0,.8),0 0 1px var(--gold-dim)}
.settings-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;
  border-bottom:1px solid var(--border);background:var(--bg)}
.settings-title{font-family:var(--ff-head);font-size:calc(11px + var(--font-delta));font-weight:700;letter-spacing:2px;
  color:var(--gold);text-transform:uppercase}
.settings-close{cursor:pointer;color:var(--text-dim);font-size:calc(14px + var(--font-delta));padding:2px 6px;
  transition:color .15s;font-family:var(--ff-mono)}
.settings-close:hover{color:var(--text)}
.settings-body{padding:16px;overflow-y:auto;flex:1}
.settings-row{margin-bottom:16px}
.settings-label{display:block;font-family:var(--ff-head);font-size:calc(8px + var(--font-delta));font-weight:700;
  color:var(--text-dim);margin-bottom:6px;letter-spacing:2px;text-transform:uppercase}
.settings-select,.settings-input{width:100%;background:var(--bg);border:1px solid var(--border2);
  border-radius:2px;color:var(--text);font-family:var(--ff-mono);font-size:max(10px, calc(11px + var(--font-delta)));
  padding:8px 10px;outline:none;cursor:pointer;transition:border-color .15s}
.settings-select:focus,.settings-input:focus{border-color:var(--gold-dim)}
.settings-size-row{display:flex;align-items:center;gap:10px}
.settings-size-btn{background:rgba(212,168,50,.08);border:1px solid var(--border2);
  color:var(--gold);font-family:var(--ff-head);font-size:calc(12px + var(--font-delta));width:28px;height:28px;
  cursor:pointer;border-radius:2px;transition:all .15s;display:flex;align-items:center;
  justify-content:center}
.settings-size-btn:hover{background:rgba(212,168,50,.15);border-color:var(--gold-dim)}
.settings-size-val{font-family:var(--ff-head);font-size:max(10px, calc(11px + var(--font-delta)));font-weight:700;color:var(--text);
  min-width:24px;text-align:center}
.settings-btn-row{margin-top:8px}
.settings-btn-row button{width:100%;padding:8px 0;background:rgba(212,168,50,.06);
  border:1px solid var(--border2);color:var(--gold);font-family:var(--ff-head);
  font-size:max(10px, calc(11px + var(--font-delta)));letter-spacing:2px;cursor:pointer;transition:all .15s}
.settings-btn-row button:hover{background:rgba(212,168,50,.12);border-color:var(--gold-dim)}

/* Logs inside settings */
.settings-logs{margin-top:16px;border-top:1px solid var(--border)}
.settings-logs-toggle{display:flex;align-items:center;gap:6px;padding:10px 0 6px;
  cursor:pointer;color:var(--text-dim);font-family:var(--ff-head);font-size:calc(8px + var(--font-delta));
  letter-spacing:2px;text-transform:uppercase;transition:color .15s;user-select:none}
.settings-logs-toggle:hover{color:var(--text)}
.settings-logs-toggle .arrow{transition:transform .2s;font-size:calc(8px + var(--font-delta))}
.settings-logs-toggle .arrow.open{transform:rotate(90deg)}
.settings-log-list{max-height:200px;overflow-y:auto;display:none}
.settings-log-list.open{display:block}
.log-entry{display:flex;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);
  font-size:max(10px, calc(9px + var(--font-delta)));line-height:1.4;font-family:var(--ff-mono)}
.log-time{color:var(--text-xs);flex-shrink:0}
.log-text{color:var(--text-dim);flex:1;word-break:break-word}
.log-tag{font-family:var(--ff-head);font-size:calc(7px + var(--font-delta));letter-spacing:1px;padding:1px 4px;
  border-radius:2px;white-space:nowrap}

/* Connection dot near settings gear */
#conn-dot{width:6px;height:6px;border-radius:50%;background:#444;margin-bottom:4px;
  transition:all .3s}
#conn-dot.connected{background:#5de8a0;box-shadow:0 0 6px rgba(93,232,160,.7)}
#conn-dot.error{background:#ff5252;box-shadow:0 0 6px rgba(255,82,82,.7)}

/* ═══════════════════════════════════════════════════════
   DOCUMENT VIEWER
═══════════════════════════════════════════════════════ */
.doc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;
  opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px)}
.doc-overlay.open{opacity:1;pointer-events:auto}
.doc-panel{position:fixed;bottom:0;left:5%;right:5%;z-index:901;
  max-height:70vh;min-height:200px;background:var(--bg1);border:1px solid var(--border2);
  border-bottom:none;border-radius:8px 8px 0 0;
  box-shadow:0 -4px 30px rgba(0,0,0,.8),0 0 60px var(--gold-glow);
  transform:translateY(100%);transition:transform .3s ease-out;
  display:flex;flex-direction:column}
.doc-panel.open{transform:translateY(0)}
.doc-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;
  border-radius:8px 8px 0 0}
.doc-hdr-title{font-family:var(--ff-head);font-size:calc(10px + var(--font-delta));font-weight:700;
  letter-spacing:1px;color:var(--gold)}
.doc-hdr-close{margin-left:auto;cursor:pointer;color:var(--text-dim);font-size:calc(14px + var(--font-delta));
  padding:2px 8px;transition:color .15s}
.doc-hdr-close:hover{color:var(--text)}
.doc-body{flex:1;overflow-y:auto;padding:20px 28px;font-size:calc(12px + var(--font-delta));line-height:1.7;
  color:var(--text);font-family:var(--ff-mono);scrollbar-width:thin;
  scrollbar-color:rgba(212,168,50,.12) transparent}
.doc-body h1,.doc-body h2,.doc-body h3{color:var(--gold);margin:14px 0 6px;
  font-family:var(--ff-head)}
.doc-body h1{font-size:calc(14px + var(--font-delta))} .doc-body h2{font-size:calc(12px + var(--font-delta))} .doc-body h3{font-size:calc(10px + var(--font-delta))}
.doc-body p{margin:6px 0}
.doc-body strong{color:#eef}
.doc-body em{color:var(--text-dim);font-style:italic}
.doc-body code{background:var(--bg2);padding:1px 5px;border-radius:3px;font-size:calc(11px + var(--font-delta));
  color:#5de8a0}
.doc-body pre{background:var(--bg);border:1px solid var(--border);border-radius:4px;
  padding:12px 16px;margin:10px 0;overflow-x:auto;font-size:calc(11px + var(--font-delta));line-height:1.5}
.doc-body pre code{background:none;padding:0;color:var(--text)}
.doc-body table{border-collapse:collapse;width:100%;margin:10px 0;font-size:calc(11px + var(--font-delta))}
.doc-body th,.doc-body td{border:1px solid var(--border);padding:6px 12px;text-align:left}
.doc-body th{background:var(--bg2);color:var(--gold);font-family:var(--ff-head);font-size:calc(9px + var(--font-delta))}
.doc-body td{color:var(--text-dim)}
.doc-body tr:nth-child(even) td{background:rgba(14,12,10,.5)}
.doc-body ul,.doc-body ol{margin:6px 0 6px 20px}
.doc-body li{margin:4px 0}
.doc-body hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.doc-body blockquote{border-left:3px solid var(--gold);padding-left:12px;margin:8px 0;
  color:var(--text-dim)}

/* ═══════════════════════════════════════════════════════
   SCANLINES
═══════════════════════════════════════════════════════ */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
  rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}

/* CJK font adjustments */
.lang-cjk .settings-title{font-size:calc(13px + var(--font-delta))}
.lang-cjk .settings-label{font-size:calc(10px + var(--font-delta))}

/* ═══════════════════════════════════════════════════════
   TOAST NOTIFICATIONS
═══════════════════════════════════════════════════════ */
#toast-container {
  position:fixed; top:12px; right:12px; z-index:3000;
  display:flex; flex-direction:column; gap:8px;
  pointer-events:none;
}
.toast {
  pointer-events:auto; min-width:220px; max-width:360px;
  padding:10px 14px; border-radius:4px;
  font-family:var(--ff-mono); font-size:calc(11px + var(--font-delta)); line-height:1.5;
  border:1px solid var(--border2);
  box-shadow:0 4px 20px rgba(0,0,0,.6);
  display:flex; align-items:center; gap:8px;
  animation:toast-in .3s ease-out forwards;
  background:var(--bg1); color:var(--text);
}
.toast.error {
  border-color:rgba(255,82,82,.5); background:rgba(26,10,10,.92); color:#ff8a80;
}
.toast.error::before {
  content:'!'; font-family:var(--ff-head); font-size:calc(10px + var(--font-delta)); font-weight:700;
  color:#ff5252; flex-shrink:0; width:20px; height:20px; border-radius:50%;
  border:1.5px solid #ff5252; display:flex; align-items:center; justify-content:center;
}
.toast.success {
  border-color:rgba(93,232,160,.4); background:rgba(10,26,10,.92); color:#81c784;
}
.toast.success::before {
  content:'\2713'; font-size:calc(13px + var(--font-delta)); color:#5de8a0; flex-shrink:0;
}
.toast.info {
  border-color:var(--gold-dim); background:rgba(14,12,10,.92); color:var(--text);
}
.toast.info::before {
  content:'i'; font-family:var(--ff-head); font-size:calc(9px + var(--font-delta)); font-weight:700;
  color:var(--gold); flex-shrink:0; width:18px; height:18px; border-radius:50%;
  border:1.5px solid var(--gold-dim); display:flex; align-items:center; justify-content:center;
}
.toast.warning {
  border-color:rgba(255,193,7,.4); background:rgba(255,193,7,.92); color:#1a1a2e;
}
.toast.warning::before {
  content:'!'; font-family:var(--ff-head); font-size:calc(10px + var(--font-delta)); font-weight:700;
  color:#1a1a2e; flex-shrink:0; width:18px; height:18px; border-radius:50%;
  border:1.5px solid rgba(26,26,46,.3); display:flex; align-items:center; justify-content:center;
}
.toast.dismissing { animation:toast-out .3s ease-in forwards; }
@keyframes toast-in {
  0%   { opacity:0; transform:translateX(40px); }
  100% { opacity:1; transform:translateX(0); }
}
@keyframes toast-out {
  0%   { opacity:1; transform:translateX(0); }
  100% { opacity:0; transform:translateX(40px); }
}

/* ═══════════════════════════════════════════════════════
   CONNECTION-LOST BANNER
═══════════════════════════════════════════════════════ */
.conn-banner {
  display:none; position:fixed; top:0; left:72px; right:0;
  z-index:1500; padding:6px 16px; text-align:center;
  font-family:var(--ff-mono); font-size:calc(10px + var(--font-delta)); letter-spacing:.5px;
  background:rgba(255,82,82,.12); border-bottom:1px solid rgba(255,82,82,.25);
  color:#ff8a80; animation:conn-pulse 2s ease-in-out infinite;
}
.conn-banner.visible { display:block; }
@keyframes conn-pulse {
  0%,100% { opacity:1; } 50% { opacity:.55; }
}
/* Reconnecting state for conn-dot */
#conn-dot.reconnecting {
  background:#ffab40; box-shadow:0 0 6px rgba(255,171,64,.7);
  animation:reconnect-blink 1s ease-in-out infinite;
}
@keyframes reconnect-blink {
  0%,100% { opacity:1; } 50% { opacity:.3; }
}

/* ═══════════════════════════════════════════════════════
   SKELETON LOADING
═══════════════════════════════════════════════════════ */
.skeleton {
  background:linear-gradient(90deg,
    rgba(255,255,255,.04) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 75%);
  background-size:200% 100%;
  animation:skeleton-shimmer 1.5s ease-in-out infinite;
  border-radius:50%;
}
@keyframes skeleton-shimmer {
  0%   { background-position:200% 0; }
  100% { background-position:-200% 0; }
}

/* ═══════════════════════════════════════════════════════
   FOCUS-VISIBLE (keyboard navigation)
═══════════════════════════════════════════════════════ */
:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
.av:focus-visible { outline:2px solid var(--gold); outline-offset:4px; border-radius:50%; }
#settings-btn:focus-visible, .settings-size-btn:focus-visible,
.settings-select:focus-visible, .settings-input:focus-visible,
#send-btn:focus-visible, #tl-send:focus-visible {
  outline:2px solid var(--gold); outline-offset:2px;
  box-shadow:0 0 0 4px rgba(212,168,50,.15);
}

/* ═══════════════════════════════════════════════════════
   SMOOTH SCROLLING
═══════════════════════════════════════════════════════ */
#msg-scroll, #tl-msg-scroll, .doc-body, .settings-log-list { scroll-behavior:smooth; }

/* ═══════════════════════════════════════════════════════
   PANEL & ELEMENT TRANSITIONS
═══════════════════════════════════════════════════════ */
#left   { transition:width .3s ease, transform .3s ease; }
#right  { transition:width .3s ease, transform .3s ease, opacity .25s; }
#center { transition:margin .3s ease; }

/* ═══════════════════════════════════════════════════════
   IMPROVED SETTINGS DIALOG
═══════════════════════════════════════════════════════ */
.settings-body { padding:18px 16px; }
.settings-row  { margin-bottom:18px; }
.settings-row:last-child { margin-bottom:10px; }
.settings-label { margin-bottom:8px; letter-spacing:2.5px; }
.settings-hdr { padding:14px 18px; }

/* ═══════════════════════════════════════════════════════
   RESPONSIVE — MOBILE (≤768px)
   Single breakpoint: tablet + phone share the same layout.
   Top agent bar → full-width chat → bottom input.
═══════════════════════════════════════════════════════ */
@media (max-width:768px) {
  /* Stack layout vertically */
  #app { flex-direction:column; }

  /* ── Top agent bar ─────────────────────────────────── */
  #left {
    order:1; width:100%; flex-shrink:0;
    flex-direction:row; padding:6px 12px;
    border-right:none; border-bottom:1px solid var(--border);
    overflow:visible;
    position:relative;
    align-items:center;
  }
  /* Agent list scrolls horizontally; footer stays fixed */
  #av-list {
    flex-direction:row; gap:20px;
    overflow-x:auto; overflow-y:visible;
    min-width:0; flex:1;
    align-items:center;
    padding:8px 12px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  #av-list::-webkit-scrollbar { display:none; }
  /* 36px avatar + 4px ring + 6px padding = comfortable spacing, no clipping */
  .av { width:36px; height:36px; flex-shrink:0; padding:6px; box-sizing:content-box; }
  .av:hover { transform:scale(1.08); }
  .av-initials { font-size:calc(10px + var(--font-delta)); }
  .av-ring { inset:-4px; }
  .av-badge { top:-3px; right:-3px; min-width:15px; height:15px; font-size:calc(7px + var(--font-delta)); }
  .av-tip { display:none; }
  .av-role-dot { width:8px; height:8px; }

  /* Scroll edge fade — only on agent list, not footer */
  #left::before {
    content:''; position:absolute; top:0; bottom:0; width:16px; left:0;
    background:linear-gradient(to right, var(--bg), transparent);
    pointer-events:none; z-index:5;
  }

  /* Left footer — pinned right, never scrolls */
  #left-footer {
    flex-direction:row; gap:8px; padding:0 0 0 8px;
    align-items:center; flex-shrink:0;
    border-left:1px solid var(--border);
    margin-left:4px;
  }
  #left-version { font-size:calc(6px + var(--font-delta)); }
  #settings-btn { width:36px; height:36px; }

  /* ── Center fills remaining space ──────────────────── */
  #center { order:2; flex:1; min-height:0; }

  /* Hide character sprite column */

// ══════════════════════════════════════════
// MESSAGE PERSISTENCE
// ══════════════════════════════════════════
const CHAT_STORAGE_PREFIX = 'agent-office-chat-';
let MSG_CAP = 50;

function getChatStorageKey() {
  return CHAT_STORAGE_PREFIX + (currentServerTeam || '__default__');
}

function saveChatHistory() {
  try {
    const trimmed = {};
    for (const id in chats) {
      const msgs = chats[id];
      trimmed[id] = msgs.length > MSG_CAP ? msgs.slice(msgs.length - MSG_CAP) : msgs;
    }
    localStorage.setItem(getChatStorageKey(), JSON.stringify({ chats: trimmed, unread }));
  } catch {}
}

function loadChatHistory() {
  try {
    const raw = localStorage.getItem(getChatStorageKey());
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.chats) {
      for (const id in data.chats) {
        const msgs = data.chats[id];
        chats[id] = msgs.length > MSG_CAP ? msgs.slice(msgs.length - MSG_CAP) : msgs;
      }
    }
    if (data.unread) unread = data.unread;
  } catch {}
}

// ══════════════════════════════════════════
// TOAST NOTIFICATION
// ══════════════════════════════════════════
function showToast(message, type, duration) {
  type = type || 'info';
  duration = duration || 3000;
  let c = document.getElementById('toast-container');
  if (!c) {
    c = document.createElement('div');
    c.id = 'toast-container';
    document.body.appendChild(c);
  }
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = message;
  c.appendChild(el);
  setTimeout(() => {
    el.classList.add('dismissing');
    el.addEventListener('animationend', () => el.remove(), { once: true });
  }, duration);
}

// ══════════════════════════════════════════
// DRY — shared message rendering + send
// ══════════════════════════════════════════
function isRawToolOutput(text) {
  const lines = text.split('\n');
  if (lines.length < 5) return false;
  // Match "123→" (Read tool), "123:" (Grep tool), "123|" formats
  const numberedLines = lines.filter(l => /^\s*\d+[→:|]/.test(l)).length;
  return numberedLines / lines.length > 0.5;
}

function tryParseJson(text) {
  const trimmed = text.trim();
  if ((trimmed[0] === '{' && trimmed[trimmed.length-1] === '}') || (trimmed[0] === '[' && trimmed[trimmed.length-1] === ']')) {
    try { return JSON.parse(trimmed); } catch {}
  }
  return null;
}

function formatBubble(text, isAgent) {
  if (!text) return null;
  if (!isAgent) return linkify(esc(text));
  const lines = text.split('\n');
  const lineCount = lines.length;
  // Raw tool output: collapse to first line preview
  if (isRawToolOutput(text)) return collapseRaw(text, lineCount);
  // JSON responses: collapse with summary extracted from fields
  if (lineCount > 3) {
    const json = tryParseJson(text);
    if (json) return collapseJson(json, lineCount);
  }
  const rendered = mdToHtml(text);
  if (lineCount > 30 || text.length > 1500) {
    const preview = esc(text.slice(0, 120).replace(/\n/g, ' ')) + '…';
    return '<details class="msg-collapse"><summary>' + preview + ' <span class="msg-collapse-meta">(' + lineCount + ' lines)</span></summary><div class="msg-collapse-body">' + rendered + '</div></details>';
  }
  return rendered;
}

function createMsgEl(m, agentName, agentColor, cssPrefix) {
  const content = formatBubble(m.text, m.from === 'agent');
  if (content === null) return null;
  const d = document.createElement('div');
  d.className = (cssPrefix || 'msg') + ' ' + m.from;
  if (m.from === 'agent' && agentColor) d.style.setProperty('--agent-col', agentColor);
  const whoCls = cssPrefix === 'tl-msg' ? 'tl-msg-who' : 'msg-who';
  const bubbleCls = cssPrefix === 'tl-msg' ? 'tl-bubble' : 'msg-bubble';
  d.innerHTML = '<div class="'+whoCls+'">'+(m.from==='agent'?esc(agentName):t('chat.you'))+' \u00B7 '+m.time+'</div><div class="'+bubbleCls+'">'+content+'</div>';
  return d;
}

function renderMessages(scrollEl, thinkEl, msgs, agentName, agentColor, cssPrefix, trackKey) {
  const prevCount = _msgRenderCounts[trackKey] || 0;
  const canAppend = prevCount > 0 && msgs.length > prevCount && msgs.length - prevCount <= 5;

  if (canAppend) {
    if (thinkEl && thinkEl.parentNode === scrollEl) scrollEl.removeChild(thinkEl);
    for (let i = prevCount; i < msgs.length; i++) {
      const el = createMsgEl(msgs[i], agentName, agentColor, cssPrefix);
      if (el) scrollEl.appendChild(el);
    }
    if (thinkEl) scrollEl.appendChild(thinkEl);
  } else {
    scrollEl.innerHTML = '';
    msgs.forEach(m => { const el = createMsgEl(m, agentName, agentColor, cssPrefix); if (el) scrollEl.appendChild(el); });
    if (thinkEl) scrollEl.appendChild(thinkEl);
  }
  _msgRenderCounts[trackKey] = msgs.length;
  scrollEl.scrollTop = scrollEl.scrollHeight;
}

async function sendToAgent(agentId, message) {
  const httpUrl = bridgeUrl.replace('ws://','http://').replace('wss://','https://');
  const res = await fetch(httpUrl + '/message', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ agentId, message, from:'user' })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res;
}

function t(key, vars) {
  const str = (I18N[currentLang]||I18N.en)[key]||I18N.en[key]||key;
  if (!vars) return str;
  return str.replace(/\{(\w+)\}/g, (_, k) => vars[k]||'');
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-ph'));
  });
  // Refresh agent chat input placeholder (uses {agent} template)
  if (activeId) {
    const ag = agents.find(a => a.id === activeId);
    if (ag) {
      const inp = document.getElementById('msg-input');
      inp.placeholder = ag.hasTmux === false
        ? t('chat.noTmux')
        : t('chat.placeholder', {agent: ag.name || ag.id});
    }
  }
}

const SETTINGS_KEY = 'agent-office-settings';
const DEFAULT_SETTINGS = { lang:'en', fontSize:15, msgCap:50 };

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    return raw ? { ...DEFAULT_SETTINGS, ...JSON.parse(raw) } : { ...DEFAULT_SETTINGS };
  } catch { return { ...DEFAULT_SETTINGS }; }
}

function saveSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch {}
}

function applySettings(s) {
  const root = document.documentElement;
  const isCJK = ['zh-TW','zh-CN','ja','ko'].includes(s.lang);
  const BASE_MAX_FONT = 13;
  const delta = s.fontSize - BASE_MAX_FONT;
  root.style.setProperty('--font-delta', delta + 'px');
  currentLang = s.lang;
  MSG_CAP = s.msgCap || 50;
  root.classList.toggle('lang-cjk', isCJK);
  applyI18n();
}

function openSettings() {
  const s = loadSettings();
  document.getElementById('set-lang').value = s.lang;
  document.getElementById('set-size-val').textContent = s.fontSize;
  document.getElementById('set-msg-cap').textContent = s.msgCap || 50;
  renderLogPanel();
  document.getElementById('settings-overlay').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settings-overlay').style.display = 'none';
}

function onSettingChange() {
  const s = {
    lang: document.getElementById('set-lang').value,
    fontSize: parseInt(document.getElementById('set-size-val').textContent, 10),
    msgCap: parseInt(document.getElementById('set-msg-cap').textContent, 10),
  };
  saveSettings(s);
  applySettings(s);
}

function resetSettings() {
  const s = { ...DEFAULT_SETTINGS };
  document.getElementById('set-lang').value = s.lang;
  document.getElementById('set-size-val').textContent = s.fontSize;
  document.getElementById('set-msg-cap').textContent = s.msgCap;
  saveSettings(s);
  applySettings(s);
}

function adjustFontSize(delta) {
  const el = document.getElementById('set-size-val');
  const current = parseInt(el.textContent, 10);
  el.textContent = Math.max(10, Math.min(20, current + delta));
  onSettingChange();
}

function adjustMsgCap(delta) {
  const el = document.getElementById('set-msg-cap');
  const current = parseInt(el.textContent, 10);
  el.textContent = Math.max(10, Math.min(200, current + delta));
  onSettingChange();
}

function toggleLogs() {
  const list = document.getElementById('settings-log-list');
  const arrow = document.getElementById('log-arrow');
  const open = list.classList.toggle('open');
  arrow.classList.toggle('open', open);
  if (open) renderLogPanel();
}

// Close settings on overlay click
document.addEventListener('click', e => {
  if (e.target === document.getElementById('settings-overlay')) closeSettings();
});

// WEBSOCKET
// ══════════════════════════════════════════
function connectWS() {
  if (ws) { try { ws.close(); } catch {} }
  bridgeUrl = document.getElementById('bridge-url').value.trim() || 'ws://localhost:3456';
  setConnStatus('status.connecting', '');

  ws = new WebSocket(bridgeUrl);

  ws.onopen = () => {
    setConnStatus('status.connected', 'connected');
    addLog('system', 'Bridge connected');
    showToast('Bridge connected', 'success', 2000);
    const banner = document.getElementById('conn-banner');
    if (banner) banner.classList.remove('visible');
    const dot = document.getElementById('conn-dot');
    if (dot) dot.classList.remove('reconnecting');
    loadChatHistory();
    fetchTeams();
    setInterval(() => ws && ws.readyState===1 && ws.send(JSON.stringify({type:'ping'})), 20000);
  };

  ws.onmessage = e => {
    try {
      const { event, data } = JSON.parse(e.data);
      if (event === 'state_update') applyState(data);
      else if (event === 'agent_reply') receiveReply(data.agentId, data.reply);
      else if (event === 'message_sent') addLog(data.agentId, `message sent: "${data.message.slice(0,40)}"`);
      else if (event === 'teams_updated') handleTeamsUpdated(data);
      else if (event === 'mode') handleModeChange(data);
    } catch {}
  };

  ws.onerror = () => {
    setConnStatus('status.error', 'error');
    showToast('WebSocket error', 'error');
  };
  ws.onclose = () => {
    setConnStatus('status.disconnected', '');
    showToast('Disconnected \u2014 reconnecting in 5s\u2026', 'warning');
    const banner = document.getElementById('conn-banner');
    if (banner) banner.classList.add('visible');
    const dot = document.getElementById('conn-dot');
    if (dot) dot.classList.add('reconnecting');
    setTimeout(connectWS, 5000);
  };
}

function setConnStatus(key, cls) {
  currentStatusKey = key;
  currentStatusCls = cls;
  const dot = document.getElementById('conn-dot');
  dot.className = cls ? cls : '';
}

// ══════════════════════════════════════════
// STATE MANAGEMENT
// ══════════════════════════════════════════
function applyState(data) {
  // Leading-edge debounce: execute first call immediately, batch subsequent within 100ms
  if (_applyTimer) {
    _applyPending = _mergePending(_applyPending, data);
    return;
  }
  _applyStateNow(data);
  _applyTimer = setTimeout(() => {
    const pending = _applyPending;
    _applyTimer = null;
    _applyPending = null;
    if (pending) _applyStateNow(pending);
  }, 100);
}

function _mergePending(existing, incoming) {
  if (!existing) return incoming;
  const map = new Map();
  (Array.isArray(existing) ? existing : [existing]).forEach(a => map.set(a.id, a));
  (Array.isArray(incoming) ? incoming : [incoming]).forEach(a => map.set(a.id, { ...(map.get(a.id)||{}), ...a }));
  return Array.from(map.values());
}

function _applyStateNow(data) {
  const arr = Array.isArray(data) ? data : [data];

  if (Array.isArray(data) && agents.length > 0 && data.length < agents.length) {
    const incoming = new Set(arr.map(u => u.id));
    const removed = agents.filter(a => !incoming.has(a.id));
    removed.forEach(a => addLog(a.id, 'left the team'));
    agents = agents.filter(a => incoming.has(a.id));
  }

  arr.forEach(u => {
    const idx = agents.findIndex(a => a.id === u.id);
    if (idx >= 0) {
      const old = agents[idx];
      if (old.status !== u.status || old.task !== u.task) {
        addLog(u.id, `${u.status}: ${u.task || '\u2026'}`);
      }
      agents[idx] = { ...old, ...u };
    } else {
      agents.push(u);
      if (!chats[u.id]) chats[u.id] = [];
      if (unread[u.id] === undefined) unread[u.id] = 0;
      addLog(u.id, `joined: ${u.task || 'online'}`);
    }
  });

  buildAvatars();
  updateTLPanel();

  // Update center chat if active agent's status changed
  if (activeId !== null) {
    const ag = agents.find(a => a.id === activeId);
    if (ag) {
      const spriteState = ag.status === 'working' ? 'thinking' :
                          ag.status === 'thinking' ? 'thinking' : 'idle';
      setSprite(activeId, spriteState);
    }
  }
}

// ══════════════════════════════════════════
// AVATARS
// ══════════════════════════════════════════
const PLACEHOLDER_COUNT = 6;

function buildAvatars() {
  const list = document.getElementById('av-list');
  const displayAgents = isMobile()
    ? agents  // Mobile: include lead/owner in the avatar top bar
    : agents.filter(a => a.role !== 'owner' && a.role !== 'lead');

  // Build snapshot of desired state
  const desiredIds = displayAgents.map(ag => ag.id);
  const desiredSnaps = {};
  displayAgents.forEach(ag => {
    const status = ag.status || 'idle';
    desiredSnaps[ag.id] = JSON.stringify({ id:ag.id, name:ag.name||ag.id, role:ag.role, status, isActive:activeId===ag.id, ur:unread[ag.id]||0 });
  });

  // Check if anything actually changed
  const prevIds = _prevAvatarIds || [];
  let changed = prevIds.length !== desiredIds.length;
  if (!changed) {
    for (let i = 0; i < desiredIds.length; i++) {
      if (prevIds[i] !== desiredIds[i] || _prevAgentSnaps[desiredIds[i]] !== desiredSnaps[desiredIds[i]]) { changed = true; break; }
    }
  }
  if (!changed) return; // Nothing changed — skip DOM update entirely

  _prevAvatarIds = desiredIds.slice();

  // Detach existing children for reuse
  const detached = [];
  while (list.firstChild) detached.push(list.removeChild(list.firstChild));

  if (displayAgents.length === 0) {
    for (let i = 0; i < PLACEHOLDER_COUNT; i++) {
      const el = document.createElement('div');
      el.className = 'av offline';
      el.style.cssText = '--col:#555';
      el.innerHTML = '<div class="av-ring"></div><div class="av-face"><div class="av-initials" style="color:#555">?</div></div><div class="av-role-dot"></div>';
      list.appendChild(el);
    }
    return;
  }

  displayAgents.forEach(ag => {
    const color = ROLE_COLORS[ag.role] || '#5de8a0';
    const name = ag.name || ag.id;
    const initials = name.slice(0, 2).toUpperCase();
    const isActive = activeId === ag.id;
    const hasUnread = (unread[ag.id] || 0) > 0;
    const status = ag.status || 'idle';
    const sd = STATUS_DOT[status] || STATUS_DOT.idle;
    const snap = desiredSnaps[ag.id];

    // Reuse unchanged element
    const existing = detached.find(el => el.id === 'av-' + ag.id);
    if (existing && _prevAgentSnaps[ag.id] === snap) {
      list.appendChild(existing);
      return;
    }
    _prevAgentSnaps[ag.id] = snap;

    const el = document.createElement('div');
    el.className = 'av' + (isActive ? ' active' : '') + (hasUnread ? ' unread' : '');
    el.id = 'av-' + ag.id;
    el.style.cssText = '--col:' + color;
    const dotStyle = 'background:'+sd.bg+(sd.shadow?';box-shadow:'+sd.shadow:'')+(sd.pulse?';animation:pulse-dot 1.5s infinite':'');
    el.innerHTML = '<div class="av-ring"></div><div class="av-face"><div class="av-initials">'+esc(initials)+'</div></div><div class="av-role-dot" style="'+dotStyle+'"></div><div class="av-badge" id="badge-'+esc(ag.id)+'">'+(unread[ag.id]||0)+'</div><div class="av-tip">'+esc(name)+'<span>'+(ROLE_LABELS[ag.role]||esc(ag.role)||'AGENT')+' \u2014 '+t('status.'+status)+'</span></div>';
    el.addEventListener('click', () => selectAgent(ag.id));
    list.appendChild(el);
  });

  // Pad with placeholders
  const remaining = PLACEHOLDER_COUNT - displayAgents.length;
  for (let i = 0; i < remaining; i++) {
    const el = document.createElement('div');
    el.className = 'av offline';
    el.style.cssText = '--col:#555';
    el.innerHTML = '<div class="av-ring"></div><div class="av-face"><div class="av-initials" style="color:#555">?</div></div><div class="av-role-dot"></div>';
    list.appendChild(el);
  }
}

function refreshBadge(id) {
  const n = unread[id] || 0;
  const badge = document.getElementById(`badge-${id}`);
  const av = document.getElementById(`av-${id}`);
  if (!badge || !av) return;
  badge.textContent = n > 99 ? '99+' : n;
  av.classList.toggle('unread', n > 0);
}

// ══════════════════════════════════════════
// CENTER CHAT — SELECT / DESELECT
// ══════════════════════════════════════════
function deselect() {
  if (activeId === null) return;
  const avEl = document.getElementById(`av-${activeId}`);
  if (avEl) avEl.classList.remove('active');
  activeId = null;
  const ca = document.getElementById('chat-area');
  ca.classList.remove('visible');
  setTimeout(() => { if (activeId === null) ca.style.display = ''; }, 350);
  document.getElementById('empty-state').classList.remove('hidden');
  const bar = document.getElementById('input-bar');
  bar.classList.add('disabled');
  bar.style.removeProperty('--agent-col');
  document.getElementById('input-agent-label').textContent = t('chat.agentLabel');
  document.getElementById('msg-input').blur();
}

function selectAgent(id) {
  if (activeId !== null) {
    const prevAv = document.getElementById(`av-${activeId}`);
    if (prevAv) prevAv.classList.remove('active');
  }
  activeId = id;
  unread[id] = 0;
  refreshBadge(id);
  const avEl = document.getElementById(`av-${id}`);
  if (avEl) avEl.classList.add('active');

  const ag = agents.find(a => a.id === id);
  if (!ag) return;

  // On mobile, if selecting a lead/owner, also set them as tlLeadId
  // so replies from the lead route correctly through receiveReply()
  if (isMobile() && (ag.role === 'lead' || ag.role === 'owner')) {
    tlLeadId = id;
  }

  const color = ROLE_COLORS[ag.role] || '#5de8a0';
  const name = ag.name || ag.id;
  document.getElementById('msg-col').style.setProperty('--agent-col', color);

  // Show chat area
  document.getElementById('empty-state').classList.add('hidden');
  const ca = document.getElementById('chat-area');
  ca.style.display = 'flex';
  ca.classList.remove('visible');
  setTimeout(() => ca.classList.add('visible'), 20);

  // Character sprite
  setSprite(id, 'idle');
  document.getElementById('char-name').textContent = name;
  document.getElementById('char-name').style.setProperty('--agent-col', color);
  document.getElementById('char-role').textContent = ROLE_LABELS[ag.role] || ag.role || 'AGENT';

  // Enable input
  const bar = document.getElementById('input-bar');
  bar.classList.remove('disabled');
  bar.style.setProperty('--agent-col', color);
  document.getElementById('input-agent-label').textContent = `\u2014 ${name}`;

  const msgInput = document.getElementById('msg-input');
  const noTmux = ag.hasTmux === false;
  if (noTmux) {
    msgInput.placeholder = t('chat.noTmux');
    msgInput.disabled = true;
    document.getElementById('send-btn').disabled = true;
  } else {
    msgInput.placeholder = t('chat.placeholder', {agent: name});
    msgInput.disabled = false;
    document.getElementById('send-btn').disabled = false;
    if (!isMobile()) msgInput.focus(); // Skip auto-focus on mobile (prevents keyboard popup)
  }

  _msgRenderCounts['center-' + id] = 0;
  renderMsgs(id);

  // On mobile, scroll the top bar to show the active agent
  if (isMobile()) scrollToActiveAgent(id);
}

/** Smoothly scroll the horizontal agent bar to bring the active agent into view */
function scrollToActiveAgent(id) {
  const list = document.getElementById('av-list');
  const el = document.getElementById('av-' + id);
  if (!list || !el) return;
  const elRight = el.offsetLeft + el.offsetWidth;
  const visLeft = list.scrollLeft;
  const visRight = list.scrollLeft + list.clientWidth;
  if (el.offsetLeft >= visLeft && elRight <= visRight) return; // already visible
  let target;
  if (el.offsetLeft < visLeft) {
    target = Math.max(0, el.offsetLeft - 8);
  } else {
    target = elRight - list.clientWidth + 8;
  }
  list.scrollTo({ left: target, behavior: 'smooth' });
}

// SPRITES
// ══════════════════════════════════════════
function setSprite(id, state) {
  const ag = agents.find(a => a.id === id);
  if (!ag || activeId !== id) return;
  const prefix = ROLE_SPRITE[ag.role] || 'DEV';
  const key = `${prefix}_${state.toUpperCase()}`;
  const img = document.getElementById('char-img');
  const src = window[key];
  if (src && img.dataset.spriteKey !== key) {
    img.dataset.spriteKey = key;
    img.style.opacity = '.65';
    setTimeout(() => { img.src = src; img.style.opacity = '1'; }, 100);
  }
}

function tlSetSprite(state) {
  if (!tlLeadId) return;
  const ag = agents.find(a => a.id === tlLeadId);
  if (!ag) return;
  const prefix = ROLE_SPRITE[ag.role] || 'MALE';
  const key = `${prefix}_${state.toUpperCase()}`;
  const img = document.getElementById('tl-img');
  const src = window[key];
  if (src && img.dataset.spriteKey !== key) {
    img.dataset.spriteKey = key;
    img.classList.toggle('owner-sprite', prefix === 'OWNER');
    img.style.opacity = '.65';
    setTimeout(() => { img.src = src; img.style.opacity = '1'; }, 100);
  }
}

// ══════════════════════════════════════════
function renderMsgs(id) {
  const scroll = document.getElementById('msg-scroll');
  const think = document.getElementById('thinking');
  const ag = agents.find(a => a.id === id);
  const name = ag ? (ag.name || ag.id) : id;
  const color = ag ? (ROLE_COLORS[ag.role] || '#5de8a0') : '#5de8a0';
  renderMessages(scroll, think, chats[id]||[], name, color, 'msg', 'center-'+id);
}

async function sendMsg() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || activeId === null) return;
  inp.value = '';
  autoH(inp);

  const ag = agents.find(a => a.id === activeId);
  if (!ag) return;
  if (!chats[activeId]) chats[activeId] = [];
  chats[activeId].push({ from:'user', text, time:now() });
  renderMsgs(activeId);
  saveChatHistory();

  const myId = activeId;
  setSprite(myId, 'thinking');
  document.getElementById('thinking').classList.add('show');
  if (_thinkTimer) clearTimeout(_thinkTimer);
  _thinkTimer = setTimeout(() => {
    document.getElementById('thinking').classList.remove('show');
    _thinkTimer = null;
  }, THINK_TIMEOUT);

  try {
    await sendToAgent(activeId, text);
    addLog(activeId, `\u2192 "${text.slice(0,40)}"`);
  } catch (e) {
    showToast(t('chat.sendFail', {err: e.message}), 'error');
    setTimeout(() => {
      if (_thinkTimer) { clearTimeout(_thinkTimer); _thinkTimer = null; }
      document.getElementById('thinking').classList.remove('show');
      demoReply(myId, text);
    }, 1500);
  }
}

function receiveReply(agentId, reply) {
  if (!chats[agentId]) chats[agentId] = [];
  // Deduplicate: skip if any recent agent message has the same text (catch-up replays)
  const recent = chats[agentId].slice(-10);
  if (recent.some(m => m.from === 'agent' && m.text === reply)) return;
  chats[agentId].push({ from:'agent', text:reply, time:now() });

  if (activeId === agentId) {
    // Hide center thinking indicator on reply
    if (_thinkTimer) { clearTimeout(_thinkTimer); _thinkTimer = null; }
    document.getElementById('thinking').classList.remove('show');
    renderMsgs(agentId);
    setSprite(agentId, 'idle');
  } else {
    unread[agentId] = (unread[agentId]||0) + 1;
    refreshBadge(agentId);
  }
  saveChatHistory();

  // Check if lead/owner reply goes to TL panel (desktop only)
  if (agentId === tlLeadId && !isMobile()) {
    // Hide TL thinking indicator on reply
    if (_tlThinkTimer) { clearTimeout(_tlThinkTimer); _tlThinkTimer = null; }
    document.getElementById('tl-thinking').classList.remove('show');
    renderTL();
    tlSetSprite('idle');
  }

  // Auto-open doc viewer for complex replies from owner/lead (skip raw tool output)
  const agent = agents.find(a => a.id === agentId);
  if (agent && (agent.role === 'owner' || agent.role === 'lead') && isComplexReply(reply) && !isRawToolOutput(reply)) {
    openDocViewer(agentId, reply);
  }
}

function demoReply(agentId, userMsg) {
  const agent = agents.find(a => a.id === agentId);
  if (!agent) return;
  const replies = {
    pm:['Got it! Adding to the backlog.','Updating sprint plan now.','Will sync with the team.'],
    architect:['Let me think about the architectural implications.','I\'d suggest microservices here.','Drafting an ADR now.'],
    dev:['On it. Pushing a branch shortly.','Found the issue \u2014 fixing now.','Writing tests first.'],
    qa:['Adding test cases for that.','Running regression suite.','Found 2 edge cases.'],
    security:['Scanning for vulnerabilities.','Reviewing the auth flow.','No CVEs found yet.'],
  };
  const pool = replies[agent.role]||['Processing: '+userMsg.slice(0,30)];
  receiveReply(agentId, pool[Math.floor(Math.random()*pool.length)]);
}

let _prevTLSelectSnap = '';

function updateTLPanel() {
  if (isMobile()) return; // TL panel hidden on mobile — lead/owner in top bar instead
  const leads = agents.filter(a => a.role === 'lead' || a.role === 'owner');
  const sel = document.getElementById('tl-lead-select');

  // Build snapshot: current agents + available teams + current mode
  const agentSnap = leads.map(a => a.id + ':' + (a.hasTmux !== false)).join(',');
  const teamSnap = cachedTeamList.map(t => t.name).join(',');
  const selectSnap = currentServerMode + '|' + (currentServerTeam||'') + '|' + agentSnap + '|' + teamSnap;

  if (_prevTLSelectSnap !== selectSnap) {
    _prevTLSelectSnap = selectSnap;
    const prevVal = sel.value;
    sel.innerHTML = '';

    // ── OWNERS optgroup (always present) ──
    const ownerGroup = document.createElement('optgroup');
    ownerGroup.label = '\u2500\u2500 OWNERS \u2500\u2500';
    if (currentServerMode === 'owner') {
      // Show individual owner agents
      const owners = leads.filter(a => a.role === 'owner');
      if (owners.length > 0) {
        owners.forEach(a => {
          const opt = document.createElement('option');
          opt.value = a.id;
          const label = 'BOSS ' + (a.name || a.id).toUpperCase();
          opt.textContent = a.hasTmux === false ? label + ' (no tmux)' : label;
          ownerGroup.appendChild(opt);
        });
      } else {
        const opt = document.createElement('option');
        opt.value = '__mode:owner';
        opt.textContent = '\u25B6 scanning\u2026';
        opt.disabled = true;
        ownerGroup.appendChild(opt);
      }
    } else {
      // Not in owner mode — show switch entry
      const opt = document.createElement('option');
      opt.value = '__mode:owner';
      opt.textContent = '\u25B6 Switch to owner sessions';
      ownerGroup.appendChild(opt);
    }
    sel.appendChild(ownerGroup);

    // ── TEAM optgroups (one per known team) ──
    cachedTeamList.forEach(tm => {
      const grp = document.createElement('optgroup');
      grp.label = '\u2500\u2500 TEAM: ' + tm.name.toUpperCase() + ' \u2500\u2500';
      if (currentServerMode === 'team' && currentServerTeam === tm.name) {
        // Show individual lead agents from this team
        const teamLeads = leads.filter(a => a.role === 'lead');
        if (teamLeads.length > 0) {
          teamLeads.forEach(a => {
            const opt = document.createElement('option');
            opt.value = a.id;
            const label = 'LEAD ' + (a.name || a.id).toUpperCase();
            opt.textContent = a.hasTmux === false ? label + ' (no tmux)' : label;
            grp.appendChild(opt);
          });
        } else {
          const opt = document.createElement('option');
          opt.value = '__mode:team:' + tm.name;
          opt.textContent = '\u25B6 scanning\u2026';
          opt.disabled = true;
          grp.appendChild(opt);
        }
      } else {
        // Not scanning this team — show switch entry
        const opt = document.createElement('option');
        opt.value = '__mode:team:' + tm.name;
        opt.textContent = '\u25B6 Switch to ' + tm.name + ' (' + tm.memberCount + ')';
        grp.appendChild(opt);
      }
      sel.appendChild(grp);
    });

    // Select best value
    if (prevVal && sel.querySelector('option[value="'+CSS.escape(prevVal)+'"]')) {
      sel.value = prevVal;
    } else if (leads.length > 0) {
      const withTmux = leads.find(a => a.hasTmux !== false);
      sel.value = withTmux ? withTmux.id : leads[0].id;
    }

    onTLSelectChange(sel.value);
    return;
  }

  const lead = leads.find(a => a.id === sel.value);
  if (lead) {
    const wasNewLead = tlLeadId !== lead.id;
    tlLeadId = lead.id;
    if (!chats[lead.id]) chats[lead.id] = [];

    // Update status dot if status changed
    const statusKey = lead.status || 'idle';
    if (_prevTLSnap !== statusKey || wasNewLead) {
      _prevTLSnap = statusKey;
      const dot = document.getElementById('tl-online-dot');
      const tlSd = STATUS_DOT[statusKey] || STATUS_DOT.idle;
      dot.style.background = tlSd.bg;
      dot.style.boxShadow = tlSd.shadow || 'none';
      const spriteState = statusKey === 'working' || statusKey === 'thinking' ? 'thinking' : 'idle';
      tlSetSprite(spriteState);
    }

    // Only render messages if count changed
    const msgCount = (chats[lead.id] || []).length;
    const alreadyRendered = (_msgRenderCounts['tl-'+lead.id] || 0) === msgCount;
    if (wasNewLead || (!alreadyRendered && _prevTLMsgCount !== msgCount)) {
      _prevTLMsgCount = msgCount;
      renderTL();
    } else {
      _prevTLMsgCount = msgCount;
    }
  } else {
    if (tlLeadId === null) return;
    tlLeadId = null;
    _prevTLSnap = '';
    _prevTLMsgCount = 0;
    document.getElementById('tl-online-dot').style.background = '#555';
    document.getElementById('tl-online-dot').style.boxShadow = 'none';
  }
}

function onTLSelectChange(agentId) {
  // Handle mode-switching entries — only switch if not already in that mode
  if (agentId && agentId.startsWith('__mode:')) {
    const parts = agentId.split(':');
    if (parts[1] === 'owner' && currentServerMode !== 'owner') {
      selectTeam('__owner__');
    } else if (parts[1] === 'team' && parts[2] &&
      !(currentServerMode === 'team' && currentServerTeam === parts[2])) {
      selectTeam(parts[2]);
    }
    return;
  }

  const lead = agents.find(a => a.id === agentId);
  if (!lead) return;
  tlLeadId = lead.id;
  if (!chats[lead.id]) chats[lead.id] = [];

  // Update label
  document.getElementById('tl-header-label').textContent =
    currentServerMode === 'team' && currentServerTeam
      ? 'TEAM: ' + currentServerTeam.toUpperCase()
      : ROLE_LABELS[lead.role] || 'LEAD';

  // Update status dot
  const statusKey = lead.status || 'idle';
  _prevTLSnap = statusKey;
  const dot = document.getElementById('tl-online-dot');
  const tlSd = STATUS_DOT[statusKey] || STATUS_DOT.idle;
  dot.style.background = tlSd.bg;
  dot.style.boxShadow = tlSd.shadow || 'none';
  const spriteState = statusKey === 'working' || statusKey === 'thinking' ? 'thinking' : 'idle';
  tlSetSprite(spriteState);

  // Enable/disable input based on tmux
  const inp = document.getElementById('tl-input');
  const btn = document.getElementById('tl-send');
  if (lead.hasTmux === false) {
    inp.placeholder = t('chat.noTmux');
    inp.disabled = true;
    btn.disabled = true;
  } else {
    inp.placeholder = t('chat.tlPlaceholder');
    inp.disabled = false;
    btn.disabled = false;
  }

  // Render messages for selected lead
  _prevTLMsgCount = (chats[lead.id] || []).length;
  _msgRenderCounts['tl-'+lead.id] = 0;
  renderTL();
}

function renderTL() {
  if (!tlLeadId) return;
  const scroll = document.getElementById('tl-msg-scroll');
  const think = document.getElementById('tl-thinking');
  const ag = agents.find(a => a.id === tlLeadId);
  const name = ag ? (ag.name || ag.id) : 'Lead';
  const color = ag ? (ROLE_COLORS[ag.role] || '#d4a832') : '#d4a832';
  renderMessages(scroll, think, chats[tlLeadId]||[], name, color, 'tl-msg', 'tl-'+tlLeadId);
}

async function sendTL() {
  const inp = document.getElementById('tl-input');
  const text = inp.value.trim();
  if (!text || !tlLeadId) return;
  inp.value = '';
  autoH(inp);

  if (!chats[tlLeadId]) chats[tlLeadId] = [];
  chats[tlLeadId].push({ from:'user', text, time:now() });
  renderTL();
  saveChatHistory();

  tlSetSprite('thinking');
  document.getElementById('tl-thinking').classList.add('show');
  if (_tlThinkTimer) clearTimeout(_tlThinkTimer);
  _tlThinkTimer = setTimeout(() => {
    document.getElementById('tl-thinking').classList.remove('show');
    _tlThinkTimer = null;
  }, THINK_TIMEOUT);

  try {
    await sendToAgent(tlLeadId, text);
    addLog(tlLeadId, `\u2192 "${text.slice(0,40)}"`);
  } catch (e) {
    showToast(t('chat.sendFail', {err: e.message}), 'error');
    setTimeout(() => {
      if (_tlThinkTimer) { clearTimeout(_tlThinkTimer); _tlThinkTimer = null; }
      document.getElementById('tl-thinking').classList.remove('show');
      const r = ['Understood. Stay focused.','Good. Escalate blockers early.','Noted.','Push updates when ready.','Acknowledged.'][Math.floor(Math.random()*5)];
      if (!chats[tlLeadId]) chats[tlLeadId] = [];
      chats[tlLeadId].push({ from:'agent', text:r, time:now() });
      renderTL();
      saveChatHistory();
      tlSetSprite('idle');
    }, 800 + Math.random() * 600);
  }
}

// DOCUMENT VIEWER
// ══════════════════════════════════════════
function isComplexReply(text) {
  if (!text || text.length < 150) return false;
  if (/\|.+\|.+\|/.test(text) && /[-:]{3,}/.test(text)) return true;
  if (/```[\s\S]+```/.test(text)) return true;
  if ((text.match(/^#{1,3}\s/gm)||[]).length >= 2) return true;
  if ((text.match(/^[\s]*[-*]\s/gm)||[]).length >= 5) return true;
  if (text.length > 400) return true;
  return false;
}

// Configure marked + highlight.js
const markedInstance = (function initMarked() {
  if (typeof marked === 'undefined' || typeof markedHighlight === 'undefined') return null;
  const inst = new marked.Marked(
    { gfm: true, breaks: true },
    markedHighlight.markedHighlight({
      langPrefix: 'hljs language-',
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      }
    })
  );
  return inst;
})();

function mdToHtml(md) {
  if (markedInstance) {
    return linkify(markedInstance.parse(md));
  }
  // Fallback: escape and wrap in <pre> if libs failed to load
  return '<pre>' + md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>';
}

// Format content for doc viewer — split mixed content into markdown + collapsed raw sections
function collapseRaw(chunk, lineCount) {
  const preview = esc(chunk.split('\n')[0].slice(0, 80)) + ' …';
  return '<details class="msg-collapse"><summary>' + preview + ' <span class="msg-collapse-meta">(' + lineCount + ' lines)</span></summary><div class="msg-collapse-body"><pre><code>' + esc(chunk) + '</code></pre></div></details>';
}

function collapseJson(json, lineCount) {
  const summary = json.summary || json.message || json.content || json.description || '';
  const label = summary ? esc(String(summary).slice(0, 100)) : 'JSON response';
  return '<details class="msg-collapse"><summary>' + label + ' <span class="msg-collapse-meta">(' + lineCount + ' lines)</span></summary><div class="msg-collapse-body"><pre><code class="language-json">' + esc(JSON.stringify(json, null, 2)) + '</code></pre></div></details>';
}

function formatDocContent(text) {
  if (!text) return '';
  // Check if the entire text is JSON
  const json = tryParseJson(text);
  if (json && text.split('\n').length > 3) {
    return collapseJson(json, text.split('\n').length);
  }
  // Split text into chunks: raw tool output vs normal markdown
  const lines = text.split('\n');
  let result = '';
  let buffer = [];
  let inRaw = false;

  function flushBuffer() {
    if (buffer.length === 0) return;
    const chunk = buffer.join('\n');
    if (inRaw) {
      result += collapseRaw(chunk, buffer.length);
    } else {
      // Check for embedded JSON blocks in markdown chunks
      const jsonInChunk = tryParseJson(chunk.trim());
      if (jsonInChunk && buffer.length > 3) {
        result += collapseJson(jsonInChunk, buffer.length);
      } else {
        result += mdToHtml(chunk);
      }
    }
    buffer = [];
  }

  for (const line of lines) {
    const isNumbered = /^\s*\d+[→:|]/.test(line);
    if (isNumbered !== inRaw) {
      flushBuffer();
      inRaw = isNumbered;
    }
    buffer.push(line);
  }
  flushBuffer();
  return result;
}

function openDocViewer(agentId, text) {
  const agent = agents.find(a => a.id === agentId);
  const color = agent ? (ROLE_COLORS[agent.role] || '#5de8a0') : '#5de8a0';
  document.getElementById('doc-title').textContent = `Report from ${agent?.name || agentId}`;
  document.getElementById('doc-title').style.color = color;
  document.getElementById('doc-body').innerHTML = formatDocContent(text);
  document.getElementById('doc-overlay').classList.add('open');
  document.getElementById('doc-panel').classList.add('open');
}

function closeDocViewer() {
  document.getElementById('doc-overlay').classList.remove('open');
  document.getElementById('doc-panel').classList.remove('open');
}
