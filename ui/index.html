<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Office — Claude Code</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400&family=Press+Start+2P&family=VT323:wght@400&display=swap');

:root {
  --bg: #0d0f1a;
  --floor: #1a1d2e;
  --border: #2a2d3e;
  --accent: #4fc3f7;
  --panel-bg: #090b14ee;
  --bubble-bg: #1a1d2e;
  --text: #e0e6ff;
  --grid: #ffffff08;
  --pm:   #ff6eb4;
  --arch: #6ec6ff;
  --dev:  #6eff9e;
  --qa:   #ffdd6e;
  --sec:  #ff8c6e;
  --font-body: 'VT323', 'Noto Sans Mono', monospace;
  --font-heading: 'Press Start 2P', 'Noto Sans Mono', monospace;
  --font-size-base: 16px;
}
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated}
body{background:var(--bg);font-family:var(--font-body);color:var(--text);
     font-size:var(--font-size-base);overflow:hidden;height:100vh;width:100vw;display:flex;flex-direction:column}

/* ── HEADER ─────────────────────────────────────────────────── */
header{background:#090b14;border-bottom:2px solid var(--border);padding:7px 16px;
       display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.logo{font-family:var(--font-heading);font-size:13px;color:var(--accent);
      text-shadow:0 0 10px #4fc3f788}
.logo em{color:var(--pm);font-style:normal}
.logo .version{font-size:9px;color:#556;margin-left:6px;vertical-align:middle}
.hright{display:flex;align-items:center;gap:14px;font-size:1.125em;color:#556}
.ws-dot{width:7px;height:7px;border-radius:50%;background:#444;
        box-shadow:none;transition:all .3s;display:inline-block;margin-right:4px}
.ws-dot.connected{background:#4caf50;box-shadow:0 0 6px #4caf50;animation:pulse 1.5s infinite}
.ws-dot.error{background:#ff5252;box-shadow:0 0 6px #ff5252}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}

/* ── MAIN ───────────────────────────────────────────────────── */
.main{display:flex;flex:1;overflow:hidden}

/* ── OFFICE SCENE ───────────────────────────────────────────── */
.office{flex:1;position:relative;overflow:hidden;isolation:isolate;background:var(--floor);
        background-image:linear-gradient(var(--grid) 1px,transparent 1px),
                          linear-gradient(90deg,var(--grid) 1px,transparent 1px);
        background-size:32px 32px}
.office::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% 80%,#1e2240 0%,transparent 70%)}
.office::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:radial-gradient(ellipse at 50% 50%,transparent 60%,#00000088 100%)}

/* ── STATIONS ───────────────────────────────────────────────── */
.station{position:absolute;display:flex;flex-direction:column;align-items:center;
         cursor:pointer;z-index:10;transition:transform .15s,filter .2s;user-select:none}
.station:hover{transform:scale(1.06);z-index:20}
.station.selected{z-index:25}

/* ── COMPACT / STACKED MODE ────────────────────────────────── */
.office.compact{display:flex;flex-wrap:wrap;align-content:flex-start;
                justify-content:center;gap:8px;padding:12px;overflow-y:auto}
.office.compact .station{position:static;flex-shrink:0}
.office.compact .station:hover{transform:scale(1.04)}
.office.compact svg.conns{display:none}
.office.compact .earth-bg{display:none}

/* ── SCENE: single SVG canvas per agent ─────────────────────── */
.scene-svg{display:block;overflow:visible}
.scene-svg.anim-working .agent-head{animation:work-head .5s ease-in-out infinite}
.scene-svg.anim-working .agent-arms{animation:work-arms .4s ease-in-out infinite}
.scene-svg.anim-thinking .agent-head{animation:think-head 3s ease-in-out infinite}
.scene-svg.anim-idle .agent-head{animation:idle-nod 2.5s ease-in-out infinite;opacity:.7}
.scene-svg.anim-idle .agent-arms{opacity:.4}
.scene-svg.anim-blocked .agent-head{animation:blocked-shake 1s ease-in-out infinite}
.scene-svg.anim-reviewing .agent-head{animation:think-head 2s ease-in-out infinite}
@keyframes work-head{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes work-arms{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes think-head{0%,100%{transform:rotate(0) translateY(0)}40%{transform:rotate(-6deg) translateY(-3px)}70%{transform:rotate(3deg) translateY(-1px)}}
@keyframes idle-nod{0%,100%{transform:rotate(0) translateY(0)}50%{transform:rotate(14deg) translateY(3px)}}
@keyframes blocked-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}

/* ── NAMETAG & STATUS ───────────────────────────────────────── */
.nametag{font-family:var(--font-heading);font-size:9px;padding:3px 7px;
         border-radius:2px;margin-top:4px;white-space:nowrap;border:1px solid currentColor;opacity:.9}
.sbadge{font-size:1em;padding:2px 8px;border-radius:2px;margin-top:2px;
        background:#ffffff10;color:#aaa;white-space:nowrap}
.sbadge.working{color:#4caf50}.sbadge.thinking{color:#ffdd6e}
.sbadge.idle{color:#555}.sbadge.blocked{color:#ff5252}.sbadge.reviewing{color:#6ec6ff}

/* ── PROGRESS ───────────────────────────────────────────────── */
.prog-wrap{width:80px;height:4px;background:#ffffff10;border-radius:2px;margin-top:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:2px;transition:width .5s ease}

/* ── SPEECH BUBBLE (hover) ──────────────────────────────────── */
.speech{position:absolute;top:-54px;left:50%;transform:translateX(-50%) translateY(6px);
        background:var(--bubble-bg);border:1px solid var(--border);border-radius:4px;
        padding:6px 10px;font-size:1em;white-space:nowrap;max-width:280px;
        overflow:hidden;text-overflow:ellipsis;opacity:0;transition:all .2s;
        pointer-events:none;z-index:50;box-shadow:0 2px 8px #0008}
.speech::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--border);border-bottom:none}
.station:hover .speech{opacity:1;transform:translateX(-50%) translateY(0)}
/* speech: flip below for top-edge agents */
.station.speech-below .speech{top:auto;top:100%;margin-top:4px;transform:translateX(-50%) translateY(-6px)}
.station.speech-below:hover .speech{transform:translateX(-50%) translateY(0)}
.station.speech-below .speech::after{bottom:auto;top:-5px;border:5px solid transparent;border-bottom-color:var(--border);border-top:none}
/* speech: shift right for left-edge agents */
.station.speech-align-right .speech{left:0;transform:translateY(6px)}
.station.speech-align-right:hover .speech{transform:translateY(0)}
.station.speech-align-right .speech::after{left:16px;transform:none}
/* speech: both below + right */
.station.speech-below.speech-align-right .speech{top:100%;margin-top:4px;left:0;transform:translateY(-6px)}
.station.speech-below.speech-align-right:hover .speech{transform:translateY(0)}

/* ── TYPING CURSOR ───────────────────────────────────────────── */
.cur{display:inline-block;width:6px;height:12px;background:currentColor;
     margin-left:3px;animation:blink .8s step-end infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── UNREAD BADGE ────────────────────────────────────────────── */
.unread-badge{position:absolute;top:-6px;right:-6px;background:#ff5252;
              border-radius:50%;width:16px;height:16px;font-size:0.625em;
              display:flex;align-items:center;justify-content:center;
              font-family:var(--font-heading);z-index:30;
              box-shadow:0 0 6px #ff5252;animation:pulse .8s infinite}

/* ── PARTICLES ───────────────────────────────────────────────── */
.particle{position:absolute;font-size:0.875em;animation:floatup 2s ease-out forwards;
          pointer-events:none;z-index:30}
@keyframes floatup{0%{opacity:1;transform:translateY(0) scale(1)}
                   100%{opacity:0;transform:translateY(-40px) scale(.5)}}

/* ── CONNECTIONS SVG ─────────────────────────────────────────── */
svg.conns{position:absolute;inset:0;pointer-events:none;z-index:5}

/* ── EARTH BG ──────────────────────────────────────────────────── */
.earth-bg{position:absolute;pointer-events:none;z-index:1;opacity:.8;transition:left .3s,top .3s,width .3s,height .3s}

/* ── SIDE PANEL ──────────────────────────────────────────────── */
.panel{width:310px;flex-shrink:0;background:var(--panel-bg);
       border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;font-size:1em;cursor:pointer;
     color:#445;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:#667}
.tab .badge{background:#ff5252;border-radius:50%;width:8px;height:8px;
            display:inline-block;margin-left:4px;vertical-align:middle;
            box-shadow:0 0 6px #ff5252;animation:pulse .8s infinite}
.pcontent{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:#2a2d3e transparent}

/* ── AGENT CARDS ─────────────────────────────────────────────── */
.acard{background:#12142099;border:1px solid var(--border);border-radius:4px;
       padding:10px;margin-bottom:8px;cursor:pointer;transition:all .15s;
       border-left:3px solid transparent}
.acard:hover{background:#1a1d2e}
.acard.sel{background:#1a1d2e}
.acard-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.role-icon{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;
           justify-content:center;font-size:0.875em;flex-shrink:0}
.aname{font-family:var(--font-heading);font-size:9px;flex:1}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sdot.working{background:#4caf50;box-shadow:0 0 4px #4caf50;animation:pulse 1s infinite}
.sdot.thinking{background:#ffdd6e;box-shadow:0 0 4px #ffdd6e;animation:pulse 2s infinite}
.sdot.idle{background:#333}
.sdot.blocked{background:#ff5252;box-shadow:0 0 4px #ff5252;animation:pulse .5s infinite}
.sdot.reviewing{background:#6ec6ff;box-shadow:0 0 4px #6ec6ff;animation:pulse 1.5s infinite}
.atask{font-size:1em;color:#778;line-height:1.4;max-height:42px;overflow:hidden}
.atask span{color:#99a}
.ameta{display:flex;gap:6px;margin-top:5px;font-size:0.875em;color:#445}
.chip{background:#ffffff08;border:1px solid #ffffff10;padding:2px 6px;border-radius:2px}
.aprog{width:100%;height:4px;background:#ffffff08;border-radius:2px;margin-top:6px;overflow:hidden}
.aprog-bar{height:100%;border-radius:2px;transition:width .5s}

/* ── CHAT PANEL (shown when agent selected) ──────────────────── */
.chat-panel{border-top:1px solid var(--border);flex-shrink:0;
            display:flex;flex-direction:column;max-height:70vh;min-height:120px}
.chat-resize{height:6px;cursor:ns-resize;background:transparent;flex-shrink:0;
             display:flex;align-items:center;justify-content:center}
.chat-resize::after{content:'';width:32px;height:3px;border-radius:2px;
                    background:#ffffff15;transition:background .15s}
.chat-resize:hover::after{background:#ffffff30}
.chat-hdr{padding:8px 12px;background:#090b14;border-bottom:1px solid var(--border);
          display:flex;align-items:center;gap:8px;flex-shrink:0}
.chat-hdr-icon{font-size:1em}
.chat-hdr-name{font-family:var(--font-heading);font-size:10px}
.chat-hdr-close{margin-left:auto;cursor:pointer;color:#445;font-size:1em;
                padding:2px 6px;border-radius:3px;transition:color .15s}
.chat-hdr-close:hover{color:#889}
.chat-messages{flex:1;overflow-y:auto;padding:8px;
               scrollbar-width:thin;scrollbar-color:#2a2d3e transparent;
               display:flex;flex-direction:column;gap:6px;min-height:60px}
.msg{max-width:85%;font-size:1.0625em;line-height:1.4;padding:6px 10px;border-radius:4px}
.msg.user{align-self:flex-end;background:#4fc3f720;border:1px solid #4fc3f740;color:#aee}
.msg.agent{align-self:flex-start;background:#12142099;border:1px solid var(--border);color:#ccd}
.msg-meta{font-size:0.8125em;opacity:.5;margin-top:2px}
.msg.user .msg-meta{text-align:right}
.typing-msg{align-self:flex-start;background:#12142099;border:1px solid var(--border);
            padding:6px 12px;border-radius:4px;font-size:1.25em;color:#445}
.chat-input-row{display:flex;gap:6px;padding:8px;background:#090b14;
                border-top:1px solid var(--border);flex-shrink:0}
.chat-input{flex:1;background:#0d0f1a;border:1px solid var(--border);border-radius:3px;
            color:var(--text);font-family:var(--font-body);font-size:0.9375em;
            padding:5px 8px;outline:none;transition:border-color .15s}
.chat-input:focus{border-color:var(--accent)}
.chat-send{background:#4fc3f715;border:1px solid #4fc3f740;color:var(--accent);
           font-family:var(--font-heading);font-size:10px;padding:8px 12px;
           cursor:pointer;border-radius:3px;transition:all .15s;white-space:nowrap;
           display:inline-flex;align-items:center;gap:4px;line-height:1}
.chat-send:hover{background:#4fc3f725}
.chat-send:disabled{opacity:.3;cursor:not-allowed}

/* ── DOCUMENT VIEWER (bottom slide-up over office) ────────────── */
.doc-overlay{position:fixed;inset:0;background:#00000088;z-index:900;
             opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px)}
.doc-overlay.open{opacity:1;pointer-events:auto}
.doc-panel{position:fixed;bottom:0;left:5%;right:5%;z-index:901;
           max-height:70vh;min-height:200px;
           background:#0d0f1aee;border:1px solid var(--border);
           border-bottom:none;border-radius:8px 8px 0 0;
           box-shadow:0 -4px 30px #000000aa,0 0 60px #4fc3f710;
           transform:translateY(100%);transition:transform .3s ease-out;
           display:flex;flex-direction:column}
.doc-panel.open{transform:translateY(0)}
.doc-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;
         background:#090b14cc;border-bottom:1px solid var(--border);flex-shrink:0;
         border-radius:8px 8px 0 0}
.doc-hdr-icon{font-size:1.125em}
.doc-hdr-title{font-family:var(--font-heading);font-size:10px;color:var(--accent)}
.doc-hdr-from{font-size:0.875em;color:#556}
.doc-hdr-close{margin-left:auto;cursor:pointer;color:#556;font-size:1.125em;
               padding:2px 8px;border-radius:3px;transition:color .15s}
.doc-hdr-close:hover{color:#aab}
.doc-body{flex:1;overflow-y:auto;padding:20px 28px;font-size:1em;line-height:1.7;
          color:#ccd;scrollbar-width:thin;scrollbar-color:#2a2d3e transparent}
.doc-body h1,.doc-body h2,.doc-body h3{color:var(--accent);margin:14px 0 6px;
                                        font-family:var(--font-heading)}
.doc-body h1{font-size:14px} .doc-body h2{font-size:12px} .doc-body h3{font-size:10px}
.doc-body p{margin:6px 0}
.doc-body strong{color:#eef}
.doc-body em{color:#aab;font-style:italic}
.doc-body code{background:#1a1d2e;padding:1px 5px;border-radius:3px;font-size:0.9375em;color:#6eff9e}
.doc-body pre{background:#0a0c14;border:1px solid var(--border);border-radius:4px;
              padding:12px 16px;margin:10px 0;overflow-x:auto;font-size:0.875em;line-height:1.5}
.doc-body pre code{background:none;padding:0;color:#ccd}
.doc-body table{border-collapse:collapse;width:100%;margin:10px 0;font-size:0.9375em}
.doc-body th,.doc-body td{border:1px solid var(--border);padding:6px 12px;text-align:left}
.doc-body th{background:#1a1d2e;color:var(--accent);font-family:var(--font-heading);font-size:9px}
.doc-body td{color:#aab}
.doc-body tr:nth-child(even) td{background:#0a0c1488}
.doc-body ul,.doc-body ol{margin:6px 0 6px 20px}
.doc-body li{margin:4px 0}
.doc-body hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.doc-body blockquote{border-left:3px solid var(--accent);padding-left:12px;margin:8px 0;color:#889}

/* ── LOG ─────────────────────────────────────────────────────── */
.log-entry{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #ffffff05;
           font-size:1em;line-height:1.4}
.log-time{color:#334;flex-shrink:0;font-size:0.875em;padding-top:1px}
.log-text{color:#667;flex:1}
.log-tag{font-family:var(--font-heading);font-size:9px;padding:2px 5px;border-radius:2px}

/* ── TICKER ──────────────────────────────────────────────────── */
.ticker{background:#090b14;border-top:1px solid var(--border);overflow:hidden;
        flex-shrink:0;height:24px;display:flex;align-items:center}
.ticker-track{display:flex;gap:40px;animation:scroll 35s linear infinite;
              white-space:nowrap;font-size:1em;color:#334}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti .hi{color:#4caf5066}

/* ── SCANLINES ───────────────────────────────────────────────── */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,#00000010 2px,#00000010 4px)}

/* ── BRIDGE CONFIG ───────────────────────────────────────────── */
.bridge-bar{background:#090b14;border-bottom:1px solid var(--border);padding:6px 16px;
            display:flex;align-items:center;gap:10px;font-size:1em;flex-shrink:0}
.bridge-url{background:#0d0f1a;border:1px solid var(--border);border-radius:3px;
            color:#6eff9e;font-family:var(--font-body);font-size:1em;padding:4px 8px;
            outline:none;width:200px;transition:border-color .15s}
.bridge-url:focus{border-color:var(--accent)}
.bridge-btn{background:#4fc3f710;border:1px solid #4fc3f730;color:var(--accent);
            font-family:var(--font-heading);font-size:10px;padding:6px 10px;
            cursor:pointer;border-radius:3px;transition:all .15s}
.bridge-btn:hover{background:#4fc3f720}

/* ── SETTINGS ────────────────────────────────────────────── */
.settings-btn{position:fixed;bottom:32px;left:16px;z-index:899;
  background:var(--panel-bg);border:1px solid var(--border);color:var(--accent);
  font-family:var(--font-heading);font-size:10px;padding:8px 10px;cursor:pointer;
  border-radius:2px;transition:all .15s;line-height:1}
.settings-btn:hover{background:#4fc3f715;border-color:var(--accent);box-shadow:0 0 8px #4fc3f733}
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;
  display:flex;align-items:center;justify-content:center}
.settings-dialog{background:var(--panel-bg);border:2px solid var(--border);border-radius:2px;
  width:320px;max-width:90vw;box-shadow:0 4px 24px #000a}
.settings-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  border-bottom:1px solid var(--border);background:#090b14}
.settings-title{font-family:var(--font-heading);font-size:11px;color:var(--accent);
  text-shadow:0 0 8px #4fc3f744}
.settings-close{cursor:pointer;color:#445;font-size:1em;padding:2px 6px;transition:color .15s}
.settings-close:hover{color:#889}
.settings-body{padding:14px}
.settings-row{margin-bottom:14px}
.settings-label{display:block;font-family:var(--font-heading);font-size:9px;color:#778;
  margin-bottom:6px;letter-spacing:1px}
.settings-select{width:100%;background:#0d0f1a;border:1px solid var(--border);border-radius:3px;
  color:var(--text);font-family:var(--font-body);font-size:1em;padding:6px 8px;outline:none;
  cursor:pointer;transition:border-color .15s}
.settings-select:focus{border-color:var(--accent)}
.settings-size-row{display:flex;align-items:center;gap:10px}
.settings-size-btn{background:#4fc3f710;border:1px solid #4fc3f730;color:var(--accent);
  font-family:var(--font-heading);font-size:12px;width:28px;height:28px;cursor:pointer;
  border-radius:2px;transition:all .15s}
.settings-size-btn:hover{background:#4fc3f720}
.settings-size-val{font-family:var(--font-heading);font-size:12px;color:var(--text);
  min-width:24px;text-align:center}

/* CJK heading font-size boost — Press Start 2P at Npx ≈ Noto Sans Mono at ~1.3Npx */
.lang-cjk .logo{font-size:15px}
.lang-cjk .nametag{font-size:10px}
.lang-cjk .aname{font-size:12px}
.lang-cjk .chat-hdr-name{font-size:12px}
.lang-cjk .chat-send{font-size:12px}
.lang-cjk .log-tag{font-size:11px}
.lang-cjk .bridge-btn{font-size:12px}
.lang-cjk .settings-btn{font-size:12px}
.lang-cjk .settings-title{font-size:13px}
.lang-cjk .settings-label{font-size:11px}
.lang-cjk .settings-size-btn{font-size:13px}
.lang-cjk .settings-size-val{font-size:13px}
.lang-cjk .tab{font-size:12px}
</style>
</head>
<body>

<header>
  <div class="logo">AGENT<em>OFFICE</em> <span class="version">v0.1.1</span></div>
  <div class="hright">
    <span><span class="ws-dot" id="ws-dot"></span><span id="ws-label">DISCONNECTED</span></span>
    <span id="clock">00:00:00</span>
    <span id="acnt" style="color:var(--accent)">0 AGENTS</span>
  </div>
</header>

<!-- Bridge connection bar -->
<div class="bridge-bar">
  <span style="color:#445" data-i18n="bridge.label">BRIDGE</span>
  <input class="bridge-url" id="bridge-url" value="ws://localhost:3456" placeholder="ws://localhost:3456" />
  <button class="bridge-btn" onclick="connectWS()">CONNECT</button>
  <span style="color:#445;margin-left:12px" data-i18n="bridge.team">TEAM</span>

let currentLang = 'en';

function t(key, vars) {
  const str = (I18N[currentLang] || I18N.en)[key] || I18N.en[key] || key;
  if (!vars) return str;
  return str.replace(/\{(\w+)\}/g, (_, k) => vars[k] || '');
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  // Update tabs
  const tabAgents = document.getElementById('tab-agents-btn');
  const tabLog = document.getElementById('tab-log-btn');
  if (tabAgents) tabAgents.childNodes[0].textContent = t('header.agents');
  if (tabLog) tabLog.childNodes[0].textContent = t('header.log') + ' ';
  // Update bridge bar
  const connectBtn = document.querySelector('.bridge-btn');
  if (connectBtn) connectBtn.textContent = t('bridge.connect');
  // Update chat send button
  const sendBtn = document.getElementById('chat-send-btn');
  if (sendBtn) sendBtn.textContent = t('chat.send');
  // Re-render chat messages to translate empty state
  if (selectedAgent) renderChatMessages(selectedAgent);
  // Update chat placeholder (respect disabled state for non-tmux agents)
  const chatInput = document.getElementById('chat-input');
  if (chatInput && selectedAgent) {
    if (chatInput.disabled) {
      chatInput.placeholder = t('chat.noTmux');
    } else {
      chatInput.placeholder = t('chat.placeholder', {agent: selectedAgent});
    }
  }
  // Update agent count
  const acnt = document.getElementById('acnt');
  if (acnt) acnt.textContent = t('header.agentCount', {count: agents.length});
  // Re-render connection status with correct translation
  setStatus(currentStatusKey, currentStatusCls);
  // Re-render stations to update status badges
  if (typeof renderAll === 'function') renderAll();
}

const SETTINGS_KEY = 'agent-office-settings';
const DEFAULT_SETTINGS = { lang: 'en', font: 'VT323', fontSize: 16 };

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    return raw ? { ...DEFAULT_SETTINGS, ...JSON.parse(raw) } : { ...DEFAULT_SETTINGS };
  } catch { return { ...DEFAULT_SETTINGS }; }
}

function saveSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch {}
}

function applySettings(s) {
  const root = document.documentElement;
  const isCJK = ['zh-TW', 'zh-CN', 'ja', 'ko'].includes(s.lang);
  const effectiveFont = isCJK ? 'monospace' : s.font;
  const effectiveSize = isCJK ? 13 : s.fontSize;
  const fontVal = effectiveFont.includes(',') ? effectiveFont : `'${effectiveFont}', 'Noto Sans Mono', monospace`;
  root.style.setProperty('--font-body', fontVal);
  root.style.setProperty('--font-size-base', effectiveSize + 'px');
  currentLang = s.lang;
  document.documentElement.classList.toggle('lang-cjk', isCJK);
  applyI18n();
}

function openSettings() {
  const s = loadSettings();
  document.getElementById('set-lang').value = s.lang;
  document.getElementById('set-font').value = s.font;
  document.getElementById('set-size-val').textContent = s.fontSize;
  document.getElementById('settings-overlay').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settings-overlay').style.display = 'none';
}

function getCurrentSettingsFromUI() {
  return {
    lang: document.getElementById('set-lang').value,
    font: document.getElementById('set-font').value,
    fontSize: parseInt(document.getElementById('set-size-val').textContent, 10),
  };
}

function onSettingChange() {
  const s = getCurrentSettingsFromUI();
  saveSettings(s);
  applySettings(s);
}

function resetSettings() {
  const s = { ...DEFAULT_SETTINGS };
  document.getElementById('set-lang').value = s.lang;
  document.getElementById('set-font').value = s.font;
  document.getElementById('set-size-val').textContent = s.fontSize;
  saveSettings(s);
  applySettings(s);
}

function adjustFontSize(delta) {
  const el = document.getElementById('set-size-val');
  const current = parseInt(el.textContent, 10);
  const next = Math.max(12, Math.min(24, current + delta));
  el.textContent = next;
  onSettingChange();
}

// Close settings on overlay click
document.addEventListener('click', e => {
  const overlay = document.getElementById('settings-overlay');
  if (e.target === overlay) closeSettings();
});

// ════════════════════════════════════════════════════════
// WEBSOCKET
// ════════════════════════════════════════════════════════
function connectWS() {
  if (ws) { try { ws.close(); } catch {} }
  bridgeUrl = document.getElementById('bridge-url').value.trim() || 'ws://localhost:3456';
  setStatus('status.connecting', '');

  ws = new WebSocket(bridgeUrl);

  ws.onopen = () => {
    setStatus('status.connected', 'connected');
    addLog('system', 'Bridge connected');
    fetchTeams();
    // ping keepalive
    setInterval(() => ws && ws.readyState===1 && ws.send(JSON.stringify({type:'ping'})), 20000);
  };

  ws.onmessage = e => {
    try {
      const { event, data } = JSON.parse(e.data);
      if (event === 'state_update') {
        applyState(data);
      } else if (event === 'agent_reply') {
        receiveReply(data.agentId, data.reply);
      } else if (event === 'message_sent') {
        addLog(data.agentId, `message sent: "${data.message.slice(0,40)}"`);
      } else if (event === 'teams_updated') {
        handleTeamsUpdated(data);
      } else if (event === 'mode') {
        handleModeChange(data);
      }
    } catch {}
  };

  ws.onerror = () => setStatus('status.error', 'error');
  ws.onclose = () => {
    setStatus('status.disconnected', '');
    setTimeout(connectWS, 5000); // auto-reconnect
  };
}

let currentStatusKey = 'status.disconnected';
let currentStatusCls = '';

function setStatus(key, cls) {
  currentStatusKey = key;
  currentStatusCls = cls;
  const dot = document.getElementById('ws-dot');
  const lbl = document.getElementById('ws-label');
  dot.className = 'ws-dot' + (cls ? ' ' + cls : '');
  lbl.textContent = t(key);
  document.getElementById('bridge-status').textContent = key === 'status.connected'
    ? `↔ ${bridgeUrl}` : '';
}

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
function applyState(data) {
  const arr = Array.isArray(data) ? data : [data];

  // Server always sends full state array — remove agents that disappeared
  // but only if we already had agents (avoid clearing on initial partial loads)
  if (Array.isArray(data) && agents.length > 0 && data.length < agents.length) {
    const incoming = new Set(arr.map(u => u.id));
    const removed = agents.filter(a => !incoming.has(a.id));
    removed.forEach(a => addLog(a.id, 'left the team'));
    agents = agents.filter(a => incoming.has(a.id));
  }

  arr.forEach(u => {
    const idx = agents.findIndex(a => a.id === u.id);
    if (idx >= 0) {
      const old = agents[idx];
      if (old.status !== u.status || old.task !== u.task) {
        addLog(u.id, `${u.status}: ${u.task || '…'}`);
        spawnParticle(u.id);
      }
      agents[idx] = { ...old, ...u };
    } else {
      agents.push(u);
      addLog(u.id, `joined: ${u.task || 'online'}`);
    }
  });
  renderAll();
}

// ════════════════════════════════════════════════════════
// SCENE SVG — everything drawn in one SVG for precise layering
// Layout (Y coords, SVG height = 110):
//   0-20:   ZZZ / speech area (overflow:visible)
//  20-28:   hair
//  28-44:   head
//  44-58:   torso (z2, behind macbook)
//  58-68:   legs  (z2, behind macbook)
//  50-92:   MacBook lid (z3, in front of torso)
//  92-100:  desk surface (z4)
// 100-110:  desk front/legs (z4)
//   arms: z5, reach from torso over keyboard
// ════════════════════════════════════════════════════════
function sceneSVG(agent) {
  const r = ROLES[agent.role] || ROLES.dev;
  const isIdle = (agent.status || 'idle') === 'idle';
  const isLead = agent.role === 'lead';
  const isOwner = agent.role === 'owner';
  const isBossIdle = (isLead || isOwner) && isIdle;
  const anim = isBossIdle ? 'anim-thinking' : (STATUS_ANIM[agent.status] || 'anim-idle');
  const c = r.color;

  // ── Character colors
  const skin = r.skin;
  const hair = r.hair;
  const body = r.body;
  const legs = r.legs;

  // ── Head position (center X=40, head top Y=26)
  const hx = 40, hy = 26; // head top-left (head is 18w x 16h, centered at 40)
  const headL = hx - 9;   // 31
  const headT = hy;        // 26

  // ── Hair
  const hairL = hx - 11;  // 29
  const hairT = hy - 7;   // 19

  // ── Torso (behind macbook lid)
  const torsoL = hx - 11; // 29
  const torsoT = hy + 16; // 42

  // ── MacBook: lid top Y=48, base bottom Y=95

function stationHTML(agent, pos) {
  const r = ROLES[agent.role] || ROLES.dev;
  const prog = agent.progress || 0;
  const unreadCount = unread[agent.id] || 0;

  return `
    <div class="station${selectedAgent===agent.id?' selected':''}"
         id="st-${agent.id}" data-role="${agent.role}" data-id="${agent.id}"
         style="left:${pos.left};top:${pos.top};${selectedAgent===agent.id?`filter:drop-shadow(0 0 14px ${r.color})`:''}"
         onclick="openChat('${agent.id}')">
      ${unreadCount ? `<div class="unread-badge">${unreadCount}</div>` : ''}
      <div class="speech" style="color:${r.color}">
        ${agent.task||'…'}<span class="cur" style="color:${r.color}"></span>
      </div>
      ${sceneSVG(agent)}
      <div class="prog-wrap">
        <div class="prog-bar" style="width:${prog}%;background:${r.color}55;box-shadow:0 0 4px ${r.color}"></div>
      </div>
      <div class="nametag" style="color:${r.color};border-color:${r.color}44">${agent.name||agent.id}</div>
      <div class="sbadge ${agent.status||'idle'}">${t('status.'+(agent.status||'idle'))}</div>
    </div>`;
}

// ════════════════════════════════════════════════════════
// RENDER ALL
// ════════════════════════════════════════════════════════
const COMPACT_THRESHOLD = 500; // px — office width below this switches to stacked

function isCompact() {
  const office = document.getElementById('office');
  return office.clientWidth < COMPACT_THRESHOLD;
}

function sizeEarth() {
  const office = document.getElementById('office');
  const earth = office.querySelector('.earth-bg');
  if (!earth || agents.length === 0) return;

  const or = office.getBoundingClientRect();
  const stations = office.querySelectorAll('.station');
  if (stations.length === 0) return;

  // Find bounding box of all agent stations
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  stations.forEach(el => {
    const r = el.getBoundingClientRect();
    const x1 = r.left - or.left, y1 = r.top - or.top;
    const x2 = x1 + r.width, y2 = y1 + r.height;
    if (x1 < minX) minX = x1;
    if (y1 < minY) minY = y1;
    if (x2 > maxX) maxX = x2;
    if (y2 > maxY) maxY = y2;
  });

  // Center on lead if present, otherwise center of bounding box
  const leadEl = document.getElementById(`st-${(agents.find(a=>a.role==='lead')||{}).id}`);
  let cx, cy;
  if (leadEl) {
    const lr = leadEl.getBoundingClientRect();
    cx = lr.left - or.left + lr.width / 2;
    cy = lr.top - or.top + lr.height / 2;
  } else {
    cx = (minX + maxX) / 2;
    cy = (minY + maxY) / 2;
  }

  // Diameter = max distance from center to any edge of bounding box, ×2, +padding
  const padding = 80;
  const dx = Math.max(Math.abs(maxX - cx), Math.abs(minX - cx));
  const dy = Math.max(Math.abs(maxY - cy), Math.abs(minY - cy));
  const minDiameter = 340;
  const diameter = Math.max(Math.max(dx, dy) * 2 + padding * 2, minDiameter);

  earth.style.width = diameter + 'px';
  earth.style.height = diameter + 'px';
  earth.style.left = (cx - diameter / 2) + 'px';
  earth.style.top = (cy - diameter / 2) + 'px';
}

function renderAll() {
  const office = document.getElementById('office');
  office.querySelectorAll('.station').forEach(e => e.remove());
  const compact = isCompact();
  office.classList.toggle('compact', compact);

  // Separate lead/owner from others (owner takes center when no lead)
  const lead = agents.find(a => a.role === 'lead') || agents.find(a => a.role === 'owner');
  const others = agents.filter(a => a !== lead);

  // Dummy pos for compact mode (position:static ignores left/top)
  const noPos = {left:'0',top:'0'};

  if (lead) {
    office.insertAdjacentHTML('beforeend', stationHTML(lead, compact ? noPos : CENTER_POS));
  }
  others.forEach((a, i) => {
    const pos = compact ? noPos : (SURROUND_POSITIONS[i] || {left:`${15+i*14}%`,top:'40%'});
    office.insertAdjacentHTML('beforeend', stationHTML(a, pos));
  });
  if (!compact) {
    setTimeout(drawConns, 80);
    setTimeout(sizeEarth, 100);
    setTimeout(adjustSpeechBubbles, 120);
  }
  renderAgentPanel();
  renderTicker();
  document.getElementById('acnt').textContent = t('header.agentCount', {count: agents.length});
}

// ════════════════════════════════════════════════════════
// SPEECH BUBBLE EDGE DETECTION
// ════════════════════════════════════════════════════════
function adjustSpeechBubbles() {
  const office = document.getElementById('office');
  const or = office.getBoundingClientRect();
  office.querySelectorAll('.station').forEach(el => {
    el.classList.remove('speech-below', 'speech-align-right');
    const r = el.getBoundingClientRect();
    // Near top edge: flip speech below
    if (r.top - or.top < 70) el.classList.add('speech-below');
    // Near left edge: align speech to right
    if (r.left - or.left < 150) el.classList.add('speech-align-right');
  });
}

// ════════════════════════════════════════════════════════
// CONNECTIONS
// ════════════════════════════════════════════════════════
function drawConns() {
  const svg = document.getElementById('conns');
  const office = document.getElementById('office');
  const or = office.getBoundingClientRect();
  svg.innerHTML = '';

  const pts = agents.map(a => {
    const el = document.getElementById(`st-${a.id}`);
    if (!el) return null;
    const er = el.getBoundingClientRect();
    return {x: er.left-or.left+er.width/2, y: er.top-or.top+30, idle: a.status==='idle'};
  });

  agents.forEach((a, i) => {
    if (a.status==='idle') return;
    agents.forEach((b, j) => {
      if (j<=i || b.status==='idle') return;
      const p1=pts[i], p2=pts[j];
      if (!p1||!p2) return;
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',p1.x);line.setAttribute('y1',p1.y);
      line.setAttribute('x2',p2.x);line.setAttribute('y2',p2.y);
      line.setAttribute('stroke','#4fc3f712');
      line.setAttribute('stroke-width','1');
      line.setAttribute('stroke-dasharray','4,4');
      svg.appendChild(line);
      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('r','2.5');c.setAttribute('fill','#4fc3f745');
      const am = document.createElementNS('http://www.w3.org/2000/svg','animateMotion');
      am.setAttribute('dur',`${2+Math.random()*2}s`);am.setAttribute('repeatCount','indefinite');
      am.setAttribute('path',`M${p1.x},${p1.y} L${p2.x},${p2.y}`);
      c.appendChild(am);svg.appendChild(c);
    });
  });
}

      <div class="acard${selectedAgent===a.id?' sel':''}"
           style="${selectedAgent===a.id?`border-left-color:${r.color}`:''}"
           onclick="openChat('${a.id}')">
        <div class="acard-hdr">
          <div class="role-icon" style="background:${r.color}18;border:1px solid ${r.color}35">${r.emoji}</div>
          <div>
            <div class="aname" style="color:${r.color}">${a.name||a.id}${uc?` <span style="color:#ff5252;font-size:8px">[${uc}]</span>`:''}</div>
            <div style="font-size:1em;color:#334;margin-top:2px">${r.label}</div>
          </div>
          <div class="sdot ${a.status||'idle'}" style="margin-left:auto"></div>
        </div>
        <div class="atask"><span>${t('status.'+(a.status||'idle'))}</span> — ${a.task||'standby'}</div>
        <div class="ameta">
          ${a.model?`<span class="chip">${shortModel(a.model)}</span>`:''}
          ${a.tokens?`<span class="chip">${fmtTokens(a.tokens)}</span>`:''}
          ${a.contextUsed?`<span class="chip">ctx ${fmtTokens(a.contextUsed)}/${fmtTokens(a.contextMax||200000)}</span>`:''}
        </div>
        <div class="aprog"><div class="aprog-bar" style="width:${ctxPct(a)}%;background:${r.color}55;box-shadow:0 0 4px ${r.color}33"></div></div>
      </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════
// CHAT
// ════════════════════════════════════════════════════════
function openChat(agentId) {
  selectedAgent = agentId;
  unread[agentId] = 0;
  const agent = agents.find(a => a.id === agentId);
  if (!agent) return;
  const r = ROLES[agent.role] || ROLES.dev;

  const cp = document.getElementById('chat-panel');
  cp.style.display = 'flex';
  cp.style.flexDirection = 'column';
  if (!cp.style.height) cp.style.height = '260px';
  document.getElementById('chat-icon').textContent = r.emoji;
  document.getElementById('chat-name').textContent = `${agent.name||agentId} (${r.label})`;
  document.getElementById('chat-name').style.color = r.color;
  const chatInput = document.getElementById('chat-input');
  const chatSendBtn = document.getElementById('chat-send-btn');
  const noTmux = agent.hasTmux === false;

  if (noTmux) {
    chatInput.placeholder = t('chat.noTmux');
    chatInput.disabled = true;
    chatSendBtn.disabled = true;
  } else {
    chatInput.placeholder = t('chat.placeholder', {agent: agent.name||agentId});
    chatInput.disabled = false;
    chatSendBtn.disabled = false;
  }

  renderChatMessages(agentId);
  renderAll();
  if (!noTmux) chatInput.focus();
}

function closeChat() {
  selectedAgent = null;
  document.getElementById('chat-panel').style.display = 'none';
  renderAll();
}

function renderChatMessages(agentId) {
  const msgs = chats[agentId] || [];
  const el = document.getElementById('chat-messages');
  el.innerHTML = msgs.length === 0
    ? `<div style="color:#334;font-size:1em;text-align:center;padding:10px">${t('chat.empty')}</div>`
    : msgs.map(m => `
        <div class="msg ${m.from}">
          <div>${m.text}</div>
          <div class="msg-meta">${m.time}</div>
        </div>`).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !selectedAgent) return;

  const agent = agents.find(a => a.id === selectedAgent);
  if (!agent) return;

  input.value = '';
  const btn = document.getElementById('chat-send-btn');
  btn.disabled = true;

  // Add to local chat
  if (!chats[selectedAgent]) chats[selectedAgent] = [];
  chats[selectedAgent].push({ from:'user', text:msg, time:now() });
  renderChatMessages(selectedAgent);

  // Show typing indicator
  const msgs = document.getElementById('chat-messages');
  const typing = document.createElement('div');
  typing.className = 'typing-msg';
  typing.textContent = '···';
  msgs.appendChild(typing);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const httpUrl = bridgeUrl.replace('ws://','http://').replace('wss://','https://');
    const res = await fetch(`${httpUrl}/message`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ agentId: selectedAgent, message: msg, from:'user' })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    addLog(selectedAgent, `→ "${msg.slice(0,40)}"`);
  } catch (e) {
    // Fallback: if bridge not running, show demo reply
    setTimeout(() => {
      typing.remove();
      demoReply(selectedAgent, msg);
      btn.disabled = false;
    }, 1500);
    return;
  }

  // Wait a moment then remove typing (real reply comes via WS)
  setTimeout(() => { typing.remove(); btn.disabled = false; }, 800);
}

function receiveReply(agentId, reply) {
  if (!chats[agentId]) chats[agentId] = [];
  chats[agentId].push({ from:'agent', text:reply, time:now() });

  if (selectedAgent === agentId) {
    renderChatMessages(agentId);
  } else {
    unread[agentId] = (unread[agentId]||0) + 1;
  }
  renderAgentPanel();
  spawnParticle(agentId);

  // Auto-open doc viewer for complex replies from owner/lead
  const agent = agents.find(a => a.id === agentId);
  if (agent && (agent.role === 'owner' || agent.role === 'lead') && isComplexReply(reply)) {
    openDocViewer(agentId, reply);
  }
}

// Demo replies when bridge not connected
function demoReply(agentId, userMsg) {
  const agent = agents.find(a => a.id === agentId);
  if (!agent) return;
  const r = ROLES[agent.role] || ROLES.dev;

  const replies = {
    pm:       [`Got it! I'll add "${userMsg.slice(0,30)}" to the backlog.`, `Updating the sprint plan now.`, `I'll sync with the team on that.`],
    architect:[`Interesting. Let me think about the architectural implications.`, `I'd suggest a microservice approach here.`, `Drawing up an ADR for that now.`],
    dev:      [`On it. I'll push a branch shortly.`, `Found the issue — fixing it now.`, `Writing tests for this first, then implementing.`],
    qa:       [`I'll add test cases for that scenario.`, `Running the regression suite now.`, `Found 2 edge cases to cover.`],
    security: [`Scanning for vulnerabilities related to that.`, `I'll review the auth flow for this.`, `No CVEs found, but I'm auditing further.`],
  };
  const pool = replies[agent.role] || [`Processing: ${userMsg.slice(0,30)}`];
  const reply = pool[Math.floor(Math.random()*pool.length)];

  receiveReply(agentId, reply);
  // Also update their status
  const newStatus = ['working','thinking','reviewing'][Math.floor(Math.random()*3)];
  const idx = agents.findIndex(a=>a.id===agentId);
  if (idx>=0) { agents[idx].status = newStatus; renderAll(); }
}

// DOCUMENT VIEWER
// ════════════════════════════════════════════════════════

/** Check if a reply is complex enough to warrant the doc viewer */
function isComplexReply(text) {
  if (!text || text.length < 150) return false;
  // Has markdown table
  if (/\|.+\|.+\|/.test(text) && /[-:]{3,}/.test(text)) return true;
  // Has code block
  if (/```[\s\S]+```/.test(text)) return true;
  // Has multiple headers
  if ((text.match(/^#{1,3}\s/gm) || []).length >= 2) return true;
  // Has bullet list with 5+ items
  if ((text.match(/^[\s]*[-*]\s/gm) || []).length >= 5) return true;
  // Just very long
  if (text.length > 400) return true;
  return false;
}

/** Minimal markdown → HTML renderer */
function mdToHtml(md) {
  let html = md;
  // Escape HTML entities
  html = html.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Code blocks (``` ... ```)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`);
  // Tables
  html = html.replace(/^(\|.+\|)\n(\|[-:\s|]+\|)\n((?:\|.+\|\n?)+)/gm, (_, hdr, sep, rows) => {
    const ths = hdr.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold & italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Blockquote
  html = html.replace(/^&gt;\s?(.+)$/gm, '<blockquote>$1</blockquote>');
  // Horizontal rule
  html = html.replace(/^---+$/gm, '<hr>');
  // Unordered list items
  html = html.replace(/^[\s]*[-*]\s(.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Paragraphs (double newlines)
  html = html.replace(/\n\n+/g, '</p><p>');
  // Single newlines → <br> (but not inside pre/table)
  html = html.replace(/([^>])\n([^<])/g, '$1<br>$2');
  html = `<p>${html}</p>`;
  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');
  return html;
}

function openDocViewer(agentId, text) {
  const agent = agents.find(a => a.id === agentId);
  const r = agent ? (ROLES[agent.role] || ROLES.dev) : {emoji:'📄',color:'#4fc3f7',label:'SYS'};
  document.getElementById('doc-icon').textContent = r.emoji;
  document.getElementById('doc-title').textContent = `Report from ${agent?.name || agentId}`;
  document.getElementById('doc-title').style.color = r.color;
  document.getElementById('doc-body').innerHTML = mdToHtml(text);
  document.getElementById('doc-overlay').classList.add('open');
  document.getElementById('doc-panel').classList.add('open');
}

function closeDocViewer() {
  document.getElementById('doc-overlay').classList.remove('open');
  document.getElementById('doc-panel').classList.remove('open');
}

// Close doc viewer on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDocViewer();
});

// LOGS
// ════════════════════════════════════════════════════════
function addLog(agentId, message) {
  const agent = agents.find(a=>a.id===agentId);
  const r = agent ? (ROLES[agent.role]||ROLES.dev) : {color:'#4fc3f7',emoji:'⚙️',label:'SYS'};
  const name = agent?.name || agentId;
  logs.unshift({time:now(), name, color:r.color, emoji:r.emoji, message});
  if (logs.length>100) logs.pop();

  if (document.getElementById('tab-log').style.display!=='') {
    const badge = document.getElementById('log-badge');
    badge.style.display='';
  }
  if (document.getElementById('tab-log').style.display==='') renderLogPanel();
}

function renderLogPanel() {
  document.getElementById('tab-log').innerHTML = logs.map(l =>
    `<div class="log-entry">
      <span class="log-time">${l.time}</span>
      <span class="log-text">
        <span class="log-tag" style="background:${l.color}18;color:${l.color}">${l.name}</span>
        ${l.message}
      </span>
    </div>`
  ).join('');
}

// TICKER
// ════════════════════════════════════════════════════════
function renderTicker() {
  const items = agents.map(a => {
    const r = ROLES[a.role]||ROLES.dev;
    return `<span class="ti">${r.emoji} <span style="color:${r.color}">${a.name||a.id}</span> → <span class="hi">${(a.status||'idle').toUpperCase()}</span></span>`;
  }).join(' · ');
  const t = document.getElementById('ticker');
  t.innerHTML = (items+' · '+items) || '…';
}

function spawnParticle(agentId) {
  const el = document.getElementById(`st-${agentId}`);
  if (!el) return;
  const office = document.getElementById('office');
  const sr=el.getBoundingClientRect(), or=office.getBoundingClientRect();
  const emojis=['⚡','💡','🔥','✨','🚀','💻','🛠️','🔐','📋','💬'];
  const p = document.createElement('div');
  p.className='particle';
  p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  p.style.left=(sr.left-or.left+sr.width/2)+'px';
  p.style.top=(sr.top-or.top)+'px';
  office.appendChild(p);
  setTimeout(()=>p.remove(),2000);
}

function setTab(name, el) {

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════
function now() {
  const d=new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function shortModel(m) {
  if (!m) return '';
  if (m.includes('opus')) return 'opus-4.6';
  if (m.includes('sonnet')) return 'sonnet-4.6';
  if (m.includes('haiku')) return 'haiku-4.5';
  return m.replace('claude-','').slice(0,12);
}

function fmtTokens(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return String(n);
}

function ctxPct(a) {
  if (!a.contextUsed || !a.contextMax) return 0;
  return Math.min(100, Math.round(a.contextUsed / a.contextMax * 100));
}

function updateClock() {
  document.getElementById('clock').textContent = now();
}

document.getElementById('chat-input').addEventListener('keydown', e => {

document.addEventListener('keydown', e => {

(function() {

    startH = panel.offsetHeight;
    document.body.style.cursor = 'ns-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

    if (!dragging) return;
    const h = Math.max(120, Math.min(window.innerHeight * 0.7, startH + (startY - e.clientY)));
    panel.style.height = h + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// TEAMS
// ════════════════════════════════════════════════════════
async function fetchTeams() {
  try {
    const httpUrl = bridgeUrl.replace('ws://','http://').replace('wss://','https://');

    // Fetch both teams and current mode in parallel
    const [teamsRes, modeRes] = await Promise.all([
      fetch(`${httpUrl}/teams`),
      fetch(`${httpUrl}/mode`)
    ]);

    if (teamsRes.ok) {
      const teams = await teamsRes.json();
      populateTeamDropdown(teams);
      addLog('system', `Found ${teams.length} active team(s)`);
    }

    if (modeRes.ok) {
      const modeData = await modeRes.json();
      currentServerMode = modeData.mode;
      currentServerTeam = modeData.team;

      // Apply existing state immediately if server already has agents
      if (modeData.state && modeData.state.length > 0) {
        applyState(modeData.state);
      }

      // If server is idle, help it pick the right mode
      if (modeData.mode === 'idle') {
        const teamsRes2 = await fetch(`${httpUrl}/teams`);
        const teams = teamsRes2.ok ? await teamsRes2.json() : [];
        if (teams.length > 0) {
          selectTeam(teams[teams.length - 1].name);
        } else {
          selectTeam('__owner__');
        }
      } else if (modeData.mode === 'team' && modeData.team) {
        const sel = document.getElementById('team-select');
        sel.value = modeData.team;
        addLog('system', `Resuming team: ${modeData.team}`);
      } else if (modeData.mode === 'owner') {
        addLog('system', 'Resuming owner mode');
      }
    }
  } catch {}
}

function handleTeamsUpdated(teams) {
  populateTeamDropdown(teams);
  // Server handles mode transitions — client just updates the dropdown
  // The server will send a 'mode' event if the mode changed
  addLog('system', `Teams updated: ${teams.length} active team(s)`);
}

function populateTeamDropdown(teams) {
  const sel = document.getElementById('team-select');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— select team —</option>';
  teams.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.name;
    opt.textContent = `${t.name} (${t.memberCount})`;
    sel.appendChild(opt);
  });
  // Restore selection if team still exists
  if (prev && teams.find(t => t.name === prev)) {
    sel.value = prev;
  } else if (currentServerMode === 'team' && currentServerTeam) {
    sel.value = currentServerTeam;
  }
}

async function selectTeam(teamName) {
  if (!teamName) return;
  try {
    const httpUrl = bridgeUrl.replace('ws://','http://').replace('wss://','https://');
    const endpoint = teamName === '__owner__' ? '/scan/owner' : '/scan';
    const body = teamName === '__owner__' ? {} : { team: teamName };
    const res = await fetch(`${httpUrl}${endpoint}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const result = await res.json();

    // If server returned existing state, apply it immediately
    if (result.state && result.state.length > 0) {
      agents = [];
      chats = {};
      unread = {};
      selectedAgent = null;
      closeChat();
      applyState(result.state);
    }
    // Otherwise, state will arrive via WebSocket from the scanner
  } catch (e) {
    addLog('system', `Failed to select: ${e.message}`);
  }
}

// ════════════════════════════════════════════════════════
// MODE HANDLING — server is the source of truth
let currentServerMode = 'idle';
let currentServerTeam = null;

function handleModeChange(data) {
  currentServerMode = data.mode;
  currentServerTeam = data.team;

  if (data.mode === 'team') {
    addLog('system', `Mode: team (${data.team})`);
    const sel = document.getElementById('team-select');
    if (sel.value !== data.team) sel.value = data.team;
  } else if (data.mode === 'owner') {
    addLog('system', 'Mode: owner');
    // Clear team selection
    document.getElementById('team-select').value = '';
  } else {
    addLog('system', 'Mode: idle');
    document.getElementById('team-select').value = '';
    agents = [];
    chats = {};
    unread = {};
    selectedAgent = null;
    closeChat();
    renderAll();
  }
}

// ════════════════════════════════════════════════════════
// EARTH DAY/NIGHT CYCLE
// ════════════════════════════════════════════════════════
function updateEarthCycle() {
  const h = new Date().getHours();
  // 0=midnight, 12=noon. nightFactor: 1=full night, 0=full day
  // Night: 19-5 (full), Dawn/Dusk: 5-7 & 17-19 (transition), Day: 7-17 (full)
  let nightFactor;
  if (h >= 7 && h < 17) nightFactor = 0;          // full day
  else if (h >= 19 || h < 5) nightFactor = 1;      // full night
  else if (h >= 5 && h < 7) nightFactor = 1 - (h - 5) / 2;   // dawn
  else nightFactor = (h - 17) / 2;                 // dusk

  const ocean = document.getElementById('earth-ocean');
  const land = document.getElementById('earth-land');
  const lights = document.getElementById('earth-lights');
  const glow = document.querySelector('#glow stop');
  if (!ocean) return;

  // Interpolate colors
  const lerp = (a, b, t) => Math.round(a + (b - a) * t);
  const lerpHex = (day, night, t) => {
    const d = [parseInt(day.slice(1,3),16), parseInt(day.slice(3,5),16), parseInt(day.slice(5,7),16)];
    const n = [parseInt(night.slice(1,3),16), parseInt(night.slice(3,5),16), parseInt(night.slice(5,7),16)];
    return '#' + [lerp(d[0],n[0],t), lerp(d[1],n[1],t), lerp(d[2],n[2],t)]
      .map(v => v.toString(16).padStart(2,'0')).join('');
  };

  // Ocean: day=#0c4a78 night=#040e1a
  ocean.setAttribute('fill', lerpHex('#0c4a78', '#040e1a', nightFactor));
  ocean.setAttribute('opacity', String(0.5 + nightFactor * 0.2));

  // Land: day=#1a6a3a night=#0a1a10
  land.setAttribute('fill', lerpHex('#1a6a3a', '#0a1a10', nightFactor));
  land.setAttribute('opacity', String(0.5 - nightFactor * 0.15));

  // City lights: visible at night
  lights.setAttribute('opacity', String(nightFactor * 0.85));

  // Glow: warmer during day, cooler at night
  if (glow) glow.setAttribute('stop-color', lerpHex('#1a4a6c', '#0a0e1a', nightFactor));
}
updateEarthCycle();
setInterval(updateEarthCycle, 60000); // update every minute
