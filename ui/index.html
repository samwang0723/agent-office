async function fetchTeams() {
  try {
    const httpUrl = bridgeUrl.replace('ws://','http://').replace('wss://','https://');
    const [teamsRes, modeRes] = await Promise.all([
      fetch(`${httpUrl}/teams`),
      fetch(`${httpUrl}/mode`)
    ]);

    if (teamsRes.ok) {
      const teams = await teamsRes.json();
      populateTeamDropdown(teams);
      addLog('system', `Found ${teams.length} active team(s)`);
    }

    if (modeRes.ok) {
      const modeData = await modeRes.json();
      currentServerMode = modeData.mode;
      currentServerTeam = modeData.team;

      if (modeData.state && modeData.state.length > 0) {
        applyState(modeData.state);
      }

      if (modeData.mode === 'idle') {
        const teamsRes2 = await fetch(`${httpUrl}/teams`);
        const teams = teamsRes2.ok ? await teamsRes2.json() : [];
        if (teams.length > 0) selectTeam(teams[teams.length - 1].name);
        else selectTeam('__owner__');
      } else if (modeData.mode === 'team' && modeData.team) {
        document.getElementById('team-select').value = modeData.team;
        addLog('system', `Resuming team: ${modeData.team}`);
      } else if (modeData.mode === 'owner') {
        addLog('system', 'Resuming owner mode');
      }
    }
  } catch {}
}

function handleTeamsUpdated(teams) {
  populateTeamDropdown(teams);
  addLog('system', `Teams updated: ${teams.length} active team(s)`);
}

function populateTeamDropdown(teams) {
  cachedTeamList = teams;
  const sel = document.getElementById('team-select');
  const prev = sel.value;
  sel.innerHTML = '<option value="">'+esc(t('bridge.selectTeam'))+'</option>';
  teams.forEach(tm => {
    const opt = document.createElement('option');
    opt.value = tm.name;
    opt.textContent = `${tm.name} (${tm.memberCount})`;
    sel.appendChild(opt);
  });
  if (prev && teams.find(tm => tm.name === prev)) sel.value = prev;
  else if (currentServerMode === 'team' && currentServerTeam) sel.value = currentServerTeam;
  // Refresh TL dropdown with updated team list
  _prevTLSelectSnap = '';
  updateTLPanel();
}

async function selectTeam(teamName) {
  if (!teamName) return;
  try {
    const httpUrl = bridgeUrl.replace('ws://','http://').replace('wss://','https://');
    const endpoint = teamName === '__owner__' ? '/scan/owner' : '/scan';
    const body = teamName === '__owner__' ? {} : { team: teamName };
    const res = await fetch(`${httpUrl}${endpoint}`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const result = await res.json();

    // Always reset UI state on mode switch — deselect first while activeId is set
    deselect();
    agents = [];
    chats = {};
    unread = {};
    activeId = null;
    tlLeadId = null;
    _prevAgentSnaps = {};
    _prevAvatarIds = [];
    _prevTLSnap = '';
    _prevTLSelectSnap = '';
    _prevTLMsgCount = 0;
    _msgRenderCounts = {};
    // Set team context before loading history so localStorage key is correct
    currentServerMode = teamName === '__owner__' ? 'owner' : 'team';
    currentServerTeam = teamName === '__owner__' ? null : teamName;
    buildAvatars();
    loadChatHistory();

    // Apply state if available; TL panel rebuilds via handleModeChange broadcast
    if (result.state && result.state.length > 0) {
      applyState(result.state);
    }
  } catch (e) {
    addLog('system', `Failed to select: ${e.message}`);
  }
}

function handleModeChange(data) {
  currentServerMode = data.mode;
  currentServerTeam = data.team;

  // Force TL dropdown rebuild on any mode change
  _prevTLSelectSnap = '';

  if (data.mode === 'team') {
    addLog('system', `Mode: team (${data.team})`);
    const sel = document.getElementById('team-select');
    if (sel.value !== data.team) sel.value = data.team;
  } else if (data.mode === 'owner') {
    addLog('system', 'Mode: owner');
    document.getElementById('team-select').value = '';
  } else {
    addLog('system', 'Mode: idle');
    document.getElementById('team-select').value = '';
    agents = [];
    chats = {};
    unread = {};
    activeId = null;
    tlLeadId = null;
    _prevAgentSnaps = {};
    _prevAvatarIds = [];
    _prevTLSnap = '';
    _msgRenderCounts = {};
    deselect();
    buildAvatars();
  }
  updateTLPanel();
}

// @mention autocomplete system
const mentionState = { active:false, el:null, dropdown:null, query:'', startPos:0, selectedIdx:0, items:[] };

function getMentionDropdown(inputEl) {
  if (inputEl.id === 'msg-input') return document.getElementById('mention-center');
  if (inputEl.id === 'tl-input') return document.getElementById('mention-tl');
  return null;
}

function openMention(inputEl, startPos) {
  const dd = getMentionDropdown(inputEl);
  if (!dd) return;
  Object.assign(mentionState, { active:true, el:inputEl, dropdown:dd, startPos, selectedIdx:0, query:'', items:[] });
  updateMentionList('');
}

function closeMention() {
  if (mentionState.dropdown) mentionState.dropdown.classList.remove('open');
  mentionState.active = false;
  mentionState.el = null;
  mentionState.dropdown = null;
  mentionState.items = [];
}

function updateMentionList(query) {
  const dd = mentionState.dropdown;
  if (!dd) return;
  const q = query.toLowerCase();
  const matches = agents.filter(a => {
    const name = (a.name || a.id || '').toLowerCase();
    const role = (a.role || '').toLowerCase();
    return name.includes(q) || role.includes(q) || a.id.toLowerCase().includes(q);
  });
  mentionState.items = matches;
  mentionState.selectedIdx = 0;
  if (matches.length === 0) { dd.classList.remove('open'); dd.innerHTML = ''; return; }
  dd.innerHTML = matches.map((a, i) => {
    const color = ROLE_COLORS[a.role] || '#5de8a0';
    const label = ROLE_LABELS[a.role] || (a.role||'').toUpperCase();
    const name = a.name || a.id;
    return '<div class="mention-item'+(i===0?' selected':'')+'" data-idx="'+i+'">'
      +'<span class="mention-item-dot" style="background:'+esc(color)+'"></span>'
      +'<span class="mention-item-name">@'+esc(name)+'</span>'
      +'<span class="mention-item-role">'+esc(label)+'</span></div>';
  }).join('');
  dd.classList.add('open');
  dd.querySelectorAll('.mention-item').forEach(item => {
    item.addEventListener('mousedown', e => { e.preventDefault(); acceptMention(parseInt(item.dataset.idx)); });
  });
}

function selectMentionIdx(idx) {
  const dd = mentionState.dropdown;
  if (!dd) return;
  mentionState.selectedIdx = idx;
  dd.querySelectorAll('.mention-item').forEach((el, i) => el.classList.toggle('selected', i === idx));
  const sel = dd.querySelector('.mention-item.selected');
  if (sel) sel.scrollIntoView({ block:'nearest' });
}

function acceptMention(idx) {
  const a = mentionState.items[idx];
  if (!a) { closeMention(); return; }
  const el = mentionState.el;
  const name = a.name || a.id;
  const before = el.value.substring(0, mentionState.startPos);
  const after = el.value.substring(el.selectionStart);
  el.value = before + '@' + name + ' ' + after;
  const cursor = before.length + name.length + 2;
  el.setSelectionRange(cursor, cursor);
  closeMention();
  el.focus();
}

function handleMentionInput(inputEl) {
  const val = inputEl.value;
  const pos = inputEl.selectionStart;
  // Find the @ trigger: look backwards from cursor for @
  let atPos = -1;
  for (let i = pos - 1; i >= 0; i--) {
    const ch = val[i];
    if (ch === '@') { atPos = i; break; }
    if (ch === ' ' || ch === '\n') break;
  }
  if (atPos === -1 || (atPos > 0 && val[atPos-1] !== ' ' && val[atPos-1] !== '\n')) {
    if (mentionState.active && mentionState.el === inputEl) closeMention();
    return;
  }
  const query = val.substring(atPos + 1, pos);
  if (!mentionState.active || mentionState.el !== inputEl) {
    openMention(inputEl, atPos);
  }
  mentionState.query = query;
  updateMentionList(query);
}

// Wire up both inputs
['msg-input','tl-input'].forEach(id => {
  const el = document.getElementById(id);
  const sendFn = id === 'msg-input' ? sendMsg : sendTL;

  el.addEventListener('input', () => {
    autoH(el);
    handleMentionInput(el);
  });

  el.addEventListener('keydown', e => {
    if (mentionState.active && mentionState.el === el) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectMentionIdx(Math.min(mentionState.selectedIdx + 1, mentionState.items.length - 1));
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectMentionIdx(Math.max(mentionState.selectedIdx - 1, 0));
        return;
      }
      if (e.key === 'Tab' || (e.key === 'Enter' && !e.shiftKey)) {
        if (mentionState.items.length > 0) {
          e.preventDefault();
          acceptMention(mentionState.selectedIdx);
          return;
        }
      }
      if (e.key === 'Escape') { e.preventDefault(); closeMention(); return; }
    }
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFn(); }
  });

  el.addEventListener('blur', () => { setTimeout(closeMention, 150); });
});

function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, parseInt(getComputedStyle(el).maxHeight)||88) + 'px';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function linkify(html) {
  // Skip content inside tags (especially <a>, <code>, <pre>) — only linkify text nodes
  return html.replace(/(<[^>]+>)|(https?:\/\/[^\s<>"')\]]+|www\.[^\s<>"')\]]+)/g, (match, tag, url) => {
    if (tag) return tag;
    const href = url.startsWith('www.') ? 'https://' + url : url;
    return '<a href="'+esc(href)+'" target="_blank" rel="noopener noreferrer">'+url+'</a>';
  });
}

function now() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function shortModel(m) {
  if (!m) return '';
  if (m.includes('opus')) return 'opus-4.6';
  if (m.includes('sonnet')) return 'sonnet-4.6';
  if (m.includes('haiku')) return 'haiku-4.5';
  return m.replace('claude-','').slice(0,12);
}

function fmtTokens(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return String(n);
}

// ── Right panel drag-to-resize (desktop only) ──
(function() {
  const handle = document.getElementById('right-resize');
  const panel = document.getElementById('right');
  if (!handle || !panel) return;
  let startX, startW;
  handle.addEventListener('mousedown', function(e) {
    if (isMobile()) return; // Disabled on mobile — right panel hidden
    e.preventDefault();
    startX = e.clientX;
    startW = panel.offsetWidth;
    handle.classList.add('dragging');
    document.body.classList.add('resizing-right');
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', onUp);
  });
  function onDrag(e) {
    const delta = startX - e.clientX;
    const maxW = window.innerWidth * 0.3;
    const newW = Math.max(240, Math.min(maxW, startW + delta));
    panel.style.width = newW + 'px';
  }
  function onUp() {
    handle.classList.remove('dragging');
    document.body.classList.remove('resizing-right');
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', onUp);
    try { localStorage.setItem('agent-office-tl-width', panel.style.width); } catch {}
  }
  // Restore saved width on load
  try {
    const saved = localStorage.getItem('agent-office-tl-width');
    if (saved) {
      const px = parseInt(saved, 10);
      if (px >= 240 && px <= window.innerWidth * 0.3) panel.style.width = px + 'px';
    }
  } catch {}
})();

// ── Mobile: rebuild avatars on resize (breakpoint crossing) ──
(function() {
  let wasMobile = isMobile();
  window.addEventListener('resize', function() {
    const nowMobile = isMobile();
    if (nowMobile !== wasMobile) {
      wasMobile = nowMobile;
      // Force avatar list rebuild to include/exclude lead/owner
      _prevAvatarIds = [];
      _prevAgentSnaps = {};
      buildAvatars();
      // Re-render TL panel on desktop when crossing back
      if (!nowMobile) updateTLPanel();
    }
  });
})();

// ── Mobile: handle virtual keyboard via visualViewport API ──
(function() {
  if (!isMobile() || !window.visualViewport) return;
  const bar = document.getElementById('input-bar');
  if (!bar) return;
  window.visualViewport.addEventListener('resize', function() {
    const keyboardHeight = window.innerHeight - window.visualViewport.height;
    if (keyboardHeight > 50) {
      bar.style.paddingBottom = keyboardHeight + 'px';
    } else {
      bar.style.paddingBottom = '';
    }
  });
})();
